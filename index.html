      { domain:"zenflow.store", shop_name:"ZenFlow", niche:"fitness", score:83, score_tier:"🔴 HOT", is_pro:true, freshness_label:"12min ago", theme:"Impulse", currency:"GBP", country:"🇬🇧 UK", pixels:["Meta Pixel","TikTok Pixel","Snapchat"], apps:["Yotpo","Klaviyo","CartHook","PageFly","Lucky Orange","FOMO"], product_count:27, has_aliexpress:false, traffic:[20,24,29,33,38,44,52,61,70,78,88,99], revenue_est:"$34K/mo", ad_spend_est:"$7K/mo", top_products:[{title:"Yoga Mat Pro 6mm",price:"89.00",orders:256}], strategy:["Meta Ads","TikTok Ads","Influencers"] },
      { domain:"cozykitchen.myshopify.com", shop_name:"Cozy Kitchen", niche:"home", score:47, score_tier:"🟡 WATCH", is_pro:false, freshness_label:"8h ago", theme:"Debut", currency:"USD", country:"🇺🇸 US", pixels:["Google Ads"], apps:["Mailchimp","AfterShip"], product_count:9, has_aliexpress:true, traffic:[3,4,4,5,5,6,7,6,8,7,9,10], revenue_est:"$3K/mo", ad_spend_est:"$500/mo", top_products:[{title:"Bamboo Cutting Board",price:"39.99",orders:44}], strategy:["Google Ads"] },
      { domain:"pawhaus.myshopify.com", shop_name:"Paw Haus", niche:"pets", score:31, score_tier:"⚪ COLD", is_pro:false, freshness_label:"47h ago", theme:"Unknown", currency:"USD", country:"🇨🇦 CA", pixels:[], apps:["AfterShip"], product_count:4, has_aliexpress:true, traffic:[1,1,2,1,2,2,2,3,2,3,3,4], revenue_est:"$800/mo", ad_spend_est:"$0/mo", top_products:[{title:"Dog Harness Soft",price:"29.99",orders:18}], strategy:["Organic only"] },
      { domain:"glowtech.myshopify.com", shop_name:"GlowTech", niche:"beauty", score:71, score_tier:"🟠 RISING", is_pro:true, freshness_label:"1h ago", theme:"Turbo", currency:"EUR", country:"🇩🇪 DE", pixels:["Meta Pixel","Google Ads","Pinterest"], apps:["Loox","Klaviyo","Bold Upsell","Hotjar","FOMO"], product_count:21, has_aliexpress:false, traffic:[6,8,9,11,13,16,19,22,25,28,32,38], revenue_est:"$14K/mo", ad_spend_est:"$3K/mo", top_products:[{title:"LED Face Mask",price:"129.00",orders:88}], strategy:["Meta Ads","Google Shopping","Pinterest"] },
    ];

    const ADS = [
      { id:1, brand:"Velvet Bloom", niche:"beauty", format:"Vidéo", country:"🇺🇸 US", spend_est:"€4.2K", reach_est:"280K", running_days:12, hook:"POV: your skin after 3 days 🤯", color:"#FF00A3", emoji:"💄" },
      { id:2, brand:"ZenFlow", niche:"fitness", format:"Vidéo", country:"🇬🇧 UK", spend_est:"€7.8K", reach_est:"510K", running_days:21, hook:"The yoga mat that changed everything", color:"#FF914D", emoji:"🧘" },
      { id:3, brand:"Luna Jewels", niche:"jewelry", format:"Image", country:"🇫🇷 FR", spend_est:"€1.1K", reach_est:"92K", running_days:5, hook:"Worn by 40K women this week ✨", color:"#c8a800", emoji:"💎" },
      { id:4, brand:"GlowTech", niche:"beauty", format:"Carrousel", country:"🇩🇪 DE", spend_est:"€2.9K", reach_est:"195K", running_days:8, hook:"Dermatologists can't believe the results", color:"#FF00A3", emoji:"✨" },
      { id:5, brand:"Iron Pulse", niche:"fitness", format:"Vidéo", country:"🇺🇸 US", spend_est:"€3.5K", reach_est:"240K", running_days:14, hook:"Stop wasting money on gym memberships", color:"#FF914D", emoji:"💪" },
      { id:6, brand:"Cozy Kitchen", niche:"home", format:"Image", country:"🇺🇸 US", spend_est:"€0.4K", reach_est:"28K", running_days:3, hook:"The cutting board chefs actually use", color:"#4ECDC4", emoji:"🏠" },
      { id:7, brand:"Paw Haus", niche:"pets", format:"Image", country:"🇨🇦 CA", spend_est:"€0.2K", reach_est:"14K", running_days:2, hook:"My dog literally cried happy tears", color:"#FF6B6B", emoji:"🐾" },
      { id:8, brand:"ZenFlow", niche:"fitness", format:"Carrousel", country:"🇬🇧 UK", spend_est:"€5.1K", reach_est:"380K", running_days:18, hook:"Before vs After: 30 days of yoga", color:"#FF914D", emoji:"🔥" },
    ];

    const NC = { beauty:"#FF00A3", fitness:"#FF914D", jewelry:"#c8a800", home:"#4ECDC4", tech:"#6C63FF", pets:"#FF6B6B", fashion:"#45B7D1", general:"#aaa" };
    const TC = { "🔴 HOT":"#FF00A3", "🟠 RISING":"#FF914D", "🟡 WATCH":"#c8a800", "⚪ COLD":"#999" };
    const EMOJI = { beauty:"💄", fitness:"💪", jewelry:"💎", pets:"🐾", home:"🏠", tech:"📱", fashion:"👗", general:"🛍" };
    const NICHES = ["All","beauty","fitness","jewelry","home","pets"];
    const COUNTRIES = ["All","🇺🇸 US","🇫🇷 FR","🇬🇧 UK","🇩🇪 DE","🇨🇦 CA"];
    const FORMATS = ["All","Vidéo","Image","Carrousel"];
    const TIERS = ["All","🔴 HOT","🟠 RISING","🟡 WATCH","⚪ COLD"];

    function Tag({label, color}) {
      return <span style={{fontSize:10,fontWeight:700,padding:"2px 8px",borderRadius:20,background:`${color}18`,color,border:`1px solid ${color}33`,whiteSpace:"nowrap"}}>{label}</span>;
    }

    function ScoreRing({score, tier, size=56}) {
      const r=size/2-5, c=2*Math.PI*r, fill=(score/100)*c, color=TC[tier]||"#aaa";
      return (
        <div style={{position:"relative",width:size,height:size,flexShrink:0}}>
          <svg width={size} height={size} style={{transform:"rotate(-90deg)"}}>
            <circle cx={size/2} cy={size/2} r={r} fill="none" stroke="#e8dcc8" strokeWidth="4"/>
            <circle cx={size/2} cy={size/2} r={r} fill="none" stroke={color} strokeWidth="4" strokeDasharray={`${fill} ${c}`} style={{filter:`drop-shadow(0 0 5px ${color}88)`}}/>
          </svg>
          <div style={{position:"absolute",inset:0,display:"flex",alignItems:"center",justifyContent:"center"}}>
            <span style={{fontSize:size*0.25,fontWeight:900,color:"#1a1208"}}>{score}</span>
          </div>
        </div>
      );
    }

    function MiniGraph({data, color}) {
      if(!data||!data.length) return null;
      const max=Math.max(...data), min=Math.min(...data), w=80, h=28;
      const pts=data.map((v,i)=>`${(i/(data.length-1))*w},${h-((v-min)/(max-min||1))*h}`).join(" ");
      return <svg width={w} height={h}><polyline points={pts} fill="none" stroke={color} strokeWidth="2" strokeLinecap="round" style={{filter:`drop-shadow(0 0 4px ${color}66)`}}/></svg>;
    }

    function FBtn({label, active, color="#FF00A3", onClick}) {
      return <button onClick={onClick} style={{display:"block",width:"100%",textAlign:"left",padding:"6px 10px",borderRadius:8,marginBottom:3,fontSize:12,fontWeight:active?700:400,background:active?`${color}18`:"none",color:active?color:"#7a6e62",border:active?`1.5px solid ${color}44`:"1.5px solid transparent",cursor:"pointer"}}>{label}</button>;
    }

    function ShopAnalytics({shop, onClose}) {
      const nc=NC[shop.niche]||"#FF00A3", max=Math.max(...shop.traffic);
      const months=["J","F","M","A","M","J","J","A","S","O","N","D"];
      return (
        <div onClick={onClose} style={{position:"fixed",inset:0,background:"#0009",zIndex:200,display:"flex",alignItems:"center",justifyContent:"center",backdropFilter:"blur(8px)"}}>
          <div onClick={e=>e.stopPropagation()} style={{background:"#FFF6E1",borderRadius:24,width:"min(95vw,860px)",maxHeight:"92vh",overflow:"auto",padding:"28px 32px",border:`2px solid ${nc}44`}}>
            <div style={{display:"flex",alignItems:"center",gap:14,marginBottom:24}}>
              <div style={{width:52,height:52,borderRadius:14,background:`${nc}22`,border:`2px solid ${nc}44`,display:"flex",alignItems:"center",justifyContent:"center",fontSize:24}}>{EMOJI[shop.niche]||"🛍"}</div>
              <div style={{flex:1}}>
                <div style={{display:"flex",alignItems:"center",gap:8}}>
                  <h2 style={{fontFamily:"'Syne',sans-serif",fontWeight:900,fontSize:22,color:"#1a1208"}}>{shop.shop_name}</h2>
                  {shop.is_pro&&<span style={{fontSize:10,fontWeight:800,background:"linear-gradient(90deg,#FF00A3,#FF914D)",color:"#fff",padding:"2px 8px",borderRadius:20}}>PRO</span>}
                </div>
                <div style={{fontSize:12,color:"#9e8e7a",fontFamily:"monospace"}}>{shop.domain}</div>
              </div>
              <ScoreRing score={shop.score} tier={shop.score_tier} size={64}/>
              <button onClick={onClose} style={{background:"none",border:"none",fontSize:22,cursor:"pointer",color:"#9e8e7a"}}>✕</button>
            </div>

            <div style={{display:"grid",gridTemplateColumns:"repeat(4,1fr)",gap:12,marginBottom:20}}>
              {[{label:"Revenue estimé",value:shop.revenue_est,icon:"💰",color:"#00b894"},{label:"Ad Spend",value:shop.ad_spend_est,icon:"📣",color:"#FF00A3"},{label:"Produits",value:shop.product_count,icon:"📦",color:"#FF914D"},{label:"Apps",value:shop.apps.length,icon:"⚙️",color:"#6C63FF"}].map(k=>(
                <div key={k.label} style={{background:"#fff",borderRadius:14,padding:"14px 16px",border:"1.5px solid #ede3d0"}}>
                  <div style={{fontSize:18}}>{k.icon}</div>
                  <div style={{fontSize:20,fontWeight:900,color:k.color,marginTop:4}}>{k.value}</div>
                  <div style={{fontSize:11,color:"#9e8e7a",marginTop:2}}>{k.label}</div>
                </div>
              ))}
            </div>

            <div style={{display:"grid",gridTemplateColumns:"1fr 1fr",gap:16,marginBottom:20}}>
              <div style={{background:"#fff",borderRadius:16,padding:18,border:"1.5px solid #ede3d0"}}>
                <div style={{fontWeight:800,fontSize:14,color:"#1a1208",marginBottom:14}}>📈 Croissance trafic</div>
                <div style={{display:"flex",alignItems:"flex-end",gap:4,height:80}}>
                  {shop.traffic.map((v,i)=>(
                    <div key={i} style={{flex:1,display:"flex",flexDirection:"column",alignItems:"center",gap:4}}>
                      <div style={{width:"100%",borderRadius:"4px 4px 0 0",height:`${(v/max)*68}px`,background:i===shop.traffic.length-1?`linear-gradient(180deg,${nc},${nc}88)`:`${nc}33`,minHeight:4}}/>
                      <div style={{fontSize:8,color:"#ccc"}}>{months[i]}</div>
                    </div>
                  ))}
                </div>
              </div>
              <div style={{background:"#fff",borderRadius:16,padding:18,border:"1.5px solid #ede3d0"}}>
                <div style={{fontWeight:800,fontSize:14,color:"#1a1208",marginBottom:14}}>🎯 Stratégie</div>
                {shop.strategy.map((s,i)=>{
                  const colors=["#FF00A3","#FF914D","#6C63FF","#4ECDC4"], pct=[45,30,15,10][i]||10;
                  return (
                    <div key={s} style={{marginBottom:8}}>
                      <div style={{display:"flex",justifyContent:"space-between",fontSize:12,marginBottom:3}}>
                        <span style={{color:"#3d2e1a",fontWeight:600}}>{s}</span>
                        <span style={{color:colors[i],fontWeight:700}}>{pct}%</span>
                      </div>
                      <div style={{height:6,background:"#f0e8d5",borderRadius:99}}>
                        <div style={{width:`${pct}%`,height:"100%",background:colors[i],borderRadius:99}}/>
                      </div>
                    </div>
                  );
                })}
              </div>
            </div>

            <div style={{background:"#fff",borderRadius:16,padding:18,border:"1.5px solid #ede3d0",marginBottom:16}}>
              <div style={{fontWeight:800,fontSize:14,color:"#1a1208",marginBottom:14}}>🏆 Bestsellers</div>
              {shop.top_products.map((p,i)=>(
                <div key={p.title} style={{display:"flex",alignItems:"center",gap:12,padding:"10px 14px",background:i===0?`${nc}0e`:"#faf5ea",borderRadius:10,marginBottom:4,border:i===0?`1px solid ${nc}33`:"1px solid transparent"}}>
                  <div style={{width:24,height:24,borderRadius:"50%",background:i===0?nc:"#e8dcc8",color:i===0?"#fff":"#9e8e7a",display:"flex",alignItems:"center",justifyContent:"center",fontSize:11,fontWeight:900,flexShrink:0}}>{i+1}</div>
                  <span style={{flex:1,fontSize:13,fontWeight:600,color:"#1a1208"}}>{p.title}</span>
                  <span style={{fontSize:13,fontWeight:700,color:nc}}>${p.price}</span>
                  <span style={{fontSize:12,color:"#9e8e7a"}}>{p.orders} orders</span>
                </div>
              ))}
            </div>

            <div style={{display:"grid",gridTemplateColumns:"1fr 1fr",gap:12,marginBottom:16}}>
              <div style={{background:"#fff",borderRadius:14,padding:16,border:"1.5px solid #ede3d0"}}>
                <div style={{fontWeight:800,fontSize:13,color:"#1a1208",marginBottom:8}}>⚙️ Apps</div>
                <div style={{display:"flex",flexWrap:"wrap",gap:4}}>{shop.apps.map(a=><Tag key={a} label={a} color="#6C63FF"/>)}</div>
              </div>
              <div style={{background:"#fff",borderRadius:14,padding:16,border:"1.5px solid #ede3d0"}}>
                <div style={{fontWeight:800,fontSize:13,color:"#1a1208",marginBottom:8}}>📡 Pixels</div>
                <div style={{display:"flex",flexWrap:"wrap",gap:4}}>
                  {shop.pixels.length>0?shop.pixels.map(p=><Tag key={p} label={p} color="#FF00A3"/>):<span style={{fontSize:12,color:"#ccc"}}>Aucun pixel</span>}
                </div>
              </div>
            </div>

            <a href={`https://www.facebook.com/ads/library/?q=${shop.shop_name}`} target="_blank" rel="noreferrer"
              style={{display:"block",textAlign:"center",padding:"12px",background:"linear-gradient(90deg,#FF00A3,#FF914D)",color:"#fff",borderRadius:12,fontSize:14,fontWeight:800,textDecoration:"none"}}>
              📣 Voir ses pubs sur Meta Ad Library
            </a>
          </div>
        </div>
      );
    }

    function ShopCard({shop, onAnalytics, onDuel, isDueling}) {
      const nc=NC[shop.niche]||"#aaa", tc=TC[shop.score_tier]||"#aaa";
      return (
        <div style={{background:"#fff",borderRadius:16,border:"1.5px solid #ede3d0",padding:"16px 18px",boxShadow:"0 2px 8px #c9b89514"}}>
          <div style={{display:"flex",alignItems:"center",gap:12}}>
            <div style={{width:44,height:44,borderRadius:12,flexShrink:0,background:`${nc}22`,border:`2px solid ${nc}44`,display:"flex",alignItems:"center",justifyContent:"center",fontSize:20}}>{EMOJI[shop.niche]||"🛍"}</div>
            <div style={{flex:1,minWidth:0}}>
              <div style={{display:"flex",alignItems:"center",gap:6}}>
                <span style={{fontFamily:"'Syne',sans-serif",fontWeight:800,fontSize:15,color:"#1a1208"}}>{shop.shop_name}</span>
                {shop.is_pro&&<span style={{fontSize:9,fontWeight:800,background:"linear-gradient(90deg,#FF00A3,#FF914D)",color:"#fff",padding:"2px 7px",borderRadius:20}}>PRO</span>}
              </div>
              <div style={{fontSize:11,color:"#9e8e7a",fontFamily:"monospace",marginTop:1}}>{shop.domain}</div>
            </div>
            <ScoreRing score={shop.score} tier={shop.score_tier}/>
          </div>
          <div style={{display:"flex",gap:5,flexWrap:"wrap",marginTop:10}}>
            <Tag label={`⚡ ${shop.freshness_label}`} color="#FF914D"/>
            <Tag label={shop.niche} color={nc}/>
            <Tag label={shop.country} color="#6C63FF"/>
            <Tag label={shop.theme} color="#4ECDC4"/>
            {shop.has_aliexpress&&<Tag label="AliExpress" color="#FF4444"/>}
          </div>
          {shop.pixels.length>0&&<div style={{display:"flex",gap:5,flexWrap:"wrap",marginTop:6}}>{shop.pixels.map(p=><Tag key={p} label={`📡 ${p}`} color="#FF00A3"/>)}</div>}
          <div style={{display:"flex",alignItems:"center",gap:12,marginTop:10}}>
            <span style={{fontSize:12,color:"#7a6e62"}}>⚙️ <b style={{color:"#1a1208"}}>{shop.apps.length}</b></span>
            <span style={{fontSize:12,color:"#7a6e62"}}>📦 <b style={{color:"#1a1208"}}>{shop.product_count}</b></span>
            <span style={{fontSize:12,color:"#00b894",fontWeight:700}}>{shop.revenue_est}</span>
            <div style={{flex:1,display:"flex",justifyContent:"flex-end"}}><MiniGraph data={shop.traffic} color={tc}/></div>
          </div>
          <div style={{display:"grid",gridTemplateColumns:"1fr 1fr",gap:8,marginTop:12}}>
            <button onClick={()=>onAnalytics(shop)} style={{padding:"8px",background:"linear-gradient(90deg,#FF00A3,#FF914D)",color:"#fff",border:"none",borderRadius:10,fontSize:12,fontWeight:700,cursor:"pointer"}}>📊 Analytics</button>
            <button onClick={()=>onDuel(shop)} style={{padding:"8px",background:isDueling?"#FFE11B22":"#faf5ea",color:isDueling?"#b8960a":"#3d2e1a",border:`1.5px solid ${isDueling?"#FFE11B":"#ede3d0"}`,borderRadius:10,fontSize:12,fontWeight:700,cursor:"pointer"}}>{isDueling?"✓ Sélectionné":"⚔️ Duel"}</button>
          </div>
        </div>
      );
    }

    function DuelModal({shops, onClose}) {
      const [a,b]=shops;
      const rows=[{label:"Score",va:a.score,vb:b.score,unit:"/100"},{label:"Apps",va:a.apps.length,vb:b.apps.length},{label:"Produits",va:a.product_count,vb:b.product_count},{label:"Pixels",va:a.pixels.length,vb:b.pixels.length}];
      return (
        <div onClick={onClose} style={{position:"fixed",inset:0,background:"#000a",display:"flex",alignItems:"center",justifyContent:"center",zIndex:300,backdropFilter:"blur(8px)"}}>
          <div onClick={e=>e.stopPropagation()} style={{background:"#FFF6E1",borderRadius:24,width:"min(94vw,680px)",maxHeight:"90vh",overflow:"auto",padding:28,border:"2px solid #FFE11B55"}}>
            <div style={{display:"flex",justifyContent:"space-between",marginBottom:22}}>
              <h2 style={{fontFamily:"'Syne',sans-serif",fontWeight:900,fontSize:22}}>⚔️ Duel Mode</h2>
              <button onClick={onClose} style={{background:"none",border:"none",fontSize:22,cursor:"pointer"}}>✕</button>
            </div>
            <div style={{display:"grid",gridTemplateColumns:"1fr 40px 1fr",gap:10,alignItems:"center",marginBottom:20}}>
              {[a,b].map((s,i)=>(
                <div key={i} style={{background:"#fff",borderRadius:14,padding:"14px 16px",border:"1.5px solid #ede3d0",textAlign:i===1?"right":"left"}}>
                  <div style={{fontWeight:800,fontSize:16}}>{s.shop_name}</div>
                  <div style={{fontSize:11,color:"#9e8e7a",fontFamily:"monospace"}}>{s.domain}</div>
                  <div style={{marginTop:6}}><span style={{fontSize:26,fontWeight:900,color:TC[s.score_tier]}}>{s.score}</span><span style={{fontSize:13,color:"#aaa"}}>/100</span></div>
                </div>
              ))}
              <div style={{textAlign:"center",fontWeight:900,fontSize:20,color:"#FF00A3"}}>VS</div>
            </div>
            {rows.map(({label,va,vb,unit=""})=>{
              const w=va>vb?0:vb>va?1:-1;
              return (
                <div key={label} style={{display:"grid",gridTemplateColumns:"1fr 70px 1fr",gap:8,alignItems:"center",marginBottom:8}}>
                  <div style={{background:w===0?"#FF00A318":"#fff",border:`1.5px solid ${w===0?"#FF00A3":"#ede3d0"}`,borderRadius:10,padding:"10px 14px",fontWeight:800,fontSize:18,color:"#1a1208"}}>
                    {va}{unit} {w===0&&<span style={{fontSize:11,color:"#FF00A3"}}>▲ WIN</span>}
                  </div>
                  <div style={{textAlign:"center",fontSize:11,fontWeight:700,color:"#9e8e7a"}}>{label}</div>
                  <div style={{background:w===1?"#FF00A318":"#fff",border:`1.5px solid ${w===1?"#FF00A3":"#ede3d0"}`,borderRadius:10,padding:"10px 14px",fontWeight:800,fontSize:18,color:"#1a1208",textAlign:"right"}}>
                    {w===1&&<span style={{fontSize:11,color:"#FF00A3"}}>WIN ▲ </span>}{vb}{unit}
                  </div>
                </div>
              );
            })}
          </div>
        </div>
      );
    }

    function TrendingAds() {
      const [niche,setNiche]=useState("All"), [format,setFormat]=useState("All"), [country,setCountry]=useState("All"), [saved,setSaved]=useState([]);
      const filtered=ADS.filter(a=>(niche==="All"||a.niche===niche)&&(format==="All"||a.format===format)&&(country==="All"||a.country===country));
      return (
        <div style={{display:"flex",height:"100%"}}>
          <aside style={{width:190,flexShrink:0,background:"#fff",borderRight:"1.5px solid #ede3d0",padding:16,overflowY:"auto"}}>
            <div style={{fontSize:10,fontWeight:800,letterSpacing:".1em",color:"#9e8e7a",marginBottom:12}}>FILTRES</div>
            <div style={{fontSize:11,fontWeight:700,color:"#9e8e7a",marginBottom:6}}>NICHE</div>
            {NICHES.map(n=><FBtn key={n} label={n==="All"?"🗂 Toutes":n} active={niche===n} color={NC[n]||"#FF00A3"} onClick={()=>setNiche(n)}/>)}
            <div style={{fontSize:11,fontWeight:700,color:"#9e8e7a",margin:"12px 0 6px"}}>FORMAT</div>
            {FORMATS.map(f=><FBtn key={f} label={f} active={format===f} color="#6C63FF" onClick={()=>setFormat(f)}/>)}
            <div style={{fontSize:11,fontWeight:700,color:"#9e8e7a",margin:"12px 0 6px"}}>PAYS</div>
            {COUNTRIES.map(c=><FBtn key={c} label={c} active={country===c} color="#FF914D" onClick={()=>setCountry(c)}/>)}
            {saved.length>0&&<div style={{marginTop:16,padding:12,background:"#faf5ea",borderRadius:10}}><div style={{fontSize:10,fontWeight:800,color:"#9e8e7a",marginBottom:4}}>SAUVEGARDÉES</div><div style={{fontSize:22,fontWeight:900,color:"#FF00A3"}}>{saved.length}</div></div>}
          </aside>
          <main style={{flex:1,overflowY:"auto",padding:20}}>
            <div style={{display:"flex",alignItems:"center",gap:10,marginBottom:18}}>
              <h2 style={{fontFamily:"'Syne',sans-serif",fontWeight:900,fontSize:20,color:"#1a1208"}}>Trending Ads</h2>
              <span style={{padding:"3px 10px",borderRadius:20,background:"#FF00A318",color:"#FF00A3",fontSize:11,fontWeight:800,border:"1.5px solid #FF00A333"}}>{filtered.length} pubs</span>
            </div>
            <div style={{display:"grid",gridTemplateColumns:"repeat(auto-fill,minmax(250px,1fr))",gap:14}}>
              {filtered.map(ad=>{
                const isSaved=saved.includes(ad.id);
                return (
                  <div key={ad.id} style={{background:"#fff",borderRadius:16,border:"1.5px solid #ede3d0",overflow:"hidden"}}>
                    <div style={{height:130,background:`linear-gradient(135deg,${ad.color}22,${ad.color}08)`,display:"flex",flexDirection:"column",alignItems:"center",justifyContent:"center",gap:8,borderBottom:"1px solid #ede3d0",position:"relative",padding:16}}>
                      <div style={{fontSize:34}}>{ad.emoji}</div>
                      <div style={{fontSize:12,fontWeight:700,color:"#1a1208",textAlign:"center",lineHeight:1.3}}>"{ad.hook}"</div>
                      <div style={{position:"absolute",top:8,right:8}}><Tag label={ad.format} color={ad.color}/></div>
                      <div style={{position:"absolute",top:8,left:8}}><Tag label={`🔥 ${ad.running_days}j`} color="#FF914D"/></div>
                    </div>
                    <div style={{padding:"12px 14px"}}>
                      <div style={{display:"flex",justifyContent:"space-between",alignItems:"center",marginBottom:8}}>
                        <span style={{fontWeight:700,fontSize:13,color:"#1a1208"}}>{ad.brand}</span>
                        <Tag label={ad.country} color="#6C63FF"/>
                      </div>
                      <div style={{display:"flex",gap:8,marginBottom:10}}>
                        <div style={{flex:1,background:"#faf5ea",borderRadius:8,padding:"6px 10px",textAlign:"center"}}>
                          <div style={{fontSize:13,fontWeight:800,color:"#FF00A3"}}>{ad.spend_est}</div>
                          <div style={{fontSize:10,color:"#9e8e7a"}}>dépensé</div>
                        </div>
                        <div style={{flex:1,background:"#faf5ea",borderRadius:8,padding:"6px 10px",textAlign:"center"}}>
                          <div style={{fontSize:13,fontWeight:800,color:"#FF914D"}}>{ad.reach_est}</div>
                          <div style={{fontSize:10,color:"#9e8e7a"}}>portée</div>
                        </div>
                      </div>
                      <div style={{display:"grid",gridTemplateColumns:"1fr 1fr",gap:6}}>
                        <button onClick={()=>setSaved(s=>isSaved?s.filter(i=>i!==ad.id):[...s,ad.id])} style={{padding:"7px",borderRadius:8,fontSize:12,fontWeight:700,cursor:"pointer",background:isSaved?"#FF00A318":"#faf5ea",color:isSaved?"#FF00A3":"#7a6e62",border:`1.5px solid ${isSaved?"#FF00A344":"#ede3d0"}`}}>{isSaved?"✓ Sauvée":"🔖 Sauver"}</button>
                        <a href={`https://www.facebook.com/ads/library/?q=${ad.brand}`} target="_blank" rel="noreferrer" style={{padding:"7px",borderRadius:8,fontSize:12,fontWeight:700,textAlign:"center",background:"linear-gradient(90deg,#FF00A3,#FF914D)",color:"#fff",textDecoration:"none",display:"block"}}>Meta Lib →</a>
                      </div>
                    </div>
                  </div>
                );
              })}
            </div>
          </main>
        </div>
      );
    }

    function SniperFeed() {
      const [niche,setNiche]=useState("All"), [country,setCountry]=useState("All"), [tier,setTier]=useState("All"), [proOnly,setProOnly]=useState(false), [search,setSearch]=useState(""), [duel,setDuel]=useState([]), [showDuel,setShowDuel]=useState(false), [analytics,setAnalytics]=useState(null);
      const handleDuel=shop=>setDuel(d=>d.find(s=>s.domain===shop.domain)?d.filter(s=>s.domain!==shop.domain):d.length>=2?[d[1],shop]:[...d,shop]);
      const filtered=SHOPS.filter(s=>(!proOnly||s.is_pro)&&(niche==="All"||s.niche===niche)&&(country==="All"||s.country===country)&&(tier==="All"||s.score_tier===tier)&&(!search||s.shop_name.toLowerCase().includes(search.toLowerCase()))).sort((a,b)=>b.score-a.score);
      return (
        <div style={{display:"flex",height:"100%"}}>
          <aside style={{width:200,flexShrink:0,background:"#fff",borderRight:"1.5px solid #ede3d0",padding:16,overflowY:"auto"}}>
            <div style={{fontSize:10,fontWeight:800,letterSpacing:".1em",color:"#9e8e7a",marginBottom:12}}>FILTRES</div>
            <input value={search} onChange={e=>setSearch(e.target.value)} placeholder="Rechercher..." style={{width:"100%",padding:"8px 10px",borderRadius:10,border:"1.5px solid #ede3d0",background:"#faf5ea",fontSize:12,marginBottom:14,outline:"none",fontFamily:"inherit"}}/>
            <label style={{display:"flex",alignItems:"center",gap:8,cursor:"pointer",marginBottom:14}}>
              <div onClick={()=>setProOnly(p=>!p)} style={{width:34,height:18,borderRadius:99,background:proOnly?"linear-gradient(90deg,#FF00A3,#FF914D)":"#e0d6c8",position:"relative",transition:"all .2s",cursor:"pointer",flexShrink:0}}>
                <div style={{width:14,height:14,borderRadius:"50%",background:"#fff",position:"absolute",top:2,left:proOnly?18:2,transition:"left .2s"}}/>
              </div>
              <span style={{fontSize:12,fontWeight:600,color:"#3d2e1a"}}>PRO seulement</span>
            </label>
            <div style={{fontSize:11,fontWeight:700,color:"#9e8e7a",marginBottom:6}}>NICHE</div>
            {NICHES.map(n=><FBtn key={n} label={n==="All"?"🗂 Toutes":n} active={niche===n} color={NC[n]||"#FF00A3"} onClick={()=>setNiche(n)}/>)}
            <div style={{fontSize:11,fontWeight:700,color:"#9e8e7a",margin:"12px 0 6px"}}>PAYS</div>
            {COUNTRIES.map(c=><FBtn key={c} label={c} active={country===c} color="#6C63FF" onClick={()=>setCountry(c)}/>)}
            <div style={{fontSize:11,fontWeight:700,color:"#9e8e7a",margin:"12px 0 6px"}}>SCORE</div>
            {TIERS.map(t=><FBtn key={t} label={t==="All"?"Tous":t} active={tier===t} color={TC[t]||"#FF00A3"} onClick={()=>setTier(t)}/>)}
            <div style={{marginTop:16,padding:12,background:"#faf5ea",borderRadius:10}}>
              <div style={{fontSize:10,fontWeight:800,color:"#9e8e7a",marginBottom:8}}>SESSION</div>
              {[["Détectées",filtered.length],["🔴 HOT",filtered.filter(s=>s.score>=80).length],["PRO",filtered.filter(s=>s.is_pro).length]].map(([l,v])=>(
                <div key={l} style={{display:"flex",justifyContent:"space-between",marginBottom:4,fontSize:12}}><span style={{color:"#7a6e62"}}>{l}</span><b style={{color:"#1a1208"}}>{v}</b></div>
              ))}
            </div>
          </aside>
          <main style={{flex:1,overflowY:"auto",padding:20}}>
            <div style={{display:"flex",alignItems:"center",gap:10,marginBottom:18}}>
              <h2 style={{fontFamily:"'Syne',sans-serif",fontWeight:900,fontSize:20,color:"#1a1208"}}>Sniper Feed</h2>
              <span style={{padding:"3px 10px",borderRadius:20,background:"#FF00A318",color:"#FF00A3",fontSize:11,fontWeight:800,border:"1.5px solid #FF00A333"}}>{filtered.length} stores</span>
              <div style={{flex:1}}/>
              {duel.length===2&&<button onClick={()=>setShowDuel(true)} style={{padding:"8px 18px",borderRadius:20,background:"linear-gradient(90deg,#FFE11B,#FF914D)",color:"#fff",fontWeight:800,fontSize:13,cursor:"pointer",border:"none"}}>⚔️ Lancer le Duel</button>}
              {duel.length===1&&<span style={{fontSize:12,color:"#FF914D",fontWeight:600}}>+ 1 store pour le duel</span>}
            </div>
            <div style={{display:"grid",gridTemplateColumns:"repeat(auto-fill,minmax(290px,1fr))",gap:14}}>
              {filtered.map(shop=><ShopCard key={shop.domain} shop={shop} onAnalytics={setAnalytics} onDuel={handleDuel} isDueling={duel.some(s=>s.domain===shop.domain)}/>)}
              {filtered.length===0&&<div style={{gridColumn:"1/-1",textAlign:"center",padding:"80px 0",color:"#9e8e7a"}}>Aucun store ne correspond 🎯</div>}
            </div>
          </main>
          {analytics&&<ShopAnalytics shop={analytics} onClose={()=>setAnalytics(null)}/>}
          {showDuel&&duel.length===2&&<DuelModal shops={duel} onClose={()=>setShowDuel(false)}/>}
        </div>
      );
    }

    function App() {
      const [tab,setTab]=useState("feed"), [count,setCount]=useState(1247892);
      useEffect(()=>{const t=setInterval(()=>setCount(c=>c+Math.floor(Math.random()*4)),1800);return()=>clearInterval(t)},[]);
      return (
        <div style={{height:"100vh",display:"flex",flexDirection:"column",background:"#FFF6E1"}}>
          <nav style={{display:"flex",alignItems:"center",padding:"0 20px",height:56,background:"#fff",borderBottom:"1.5px solid #ede3d0",flexShrink:0}}>
            <span style={{fontFamily:"'Syne',sans-serif",fontWeight:900,fontSize:22,background:"linear-gradient(90deg,#FF00A3,#FF914D)",WebkitBackgroundClip:"text",WebkitTextFillColor:"transparent",marginRight:24}}>SNIPING</span>
            <div style={{display:"flex",gap:4}}>
              {[{id:"feed",label:"🎯 Sniper Feed"},{id:"ads",label:"📣 Trending Ads"}].map(t=>(
                <button key={t.id} onClick={()=>setTab(t.id)} style={{padding:"6px 16px",borderRadius:20,fontSize:13,fontWeight:tab===t.id?700:500,background:tab===t.id?"linear-gradient(90deg,#FF00A322,#FF914D22)":"none",color:tab===t.id?"#FF00A3":"#7a6e62",border:tab===t.id?"1.5px solid #FF00A333":"1.5px solid transparent",cursor:"pointer"}}>{t.label}</button>
              ))}
            </div>
            <div style={{flex:1}}/>
            <div style={{display:"flex",alignItems:"center",gap:8}}>
              <div style={{width:8,height:8,borderRadius:"50%",background:"#00d084",boxShadow:"0 0 8px #00d084",animation:"pulse 1.5s infinite"}}/>
              <span style={{fontSize:12,fontWeight:600,color:"#7a6e62"}}>LIVE</span>
              <span style={{fontSize:11,color:"#bbb",marginLeft:2}}>{count.toLocaleString()} scannés</span>
            </div>
          </nav>
          <div style={{flex:1,overflow:"hidden"}}>
            {tab==="feed"?<SniperFeed/>:<TrendingAds/>}
          </div>
        </div>
      );
    }

    ReactDOM.createRoot(document.getElementById("root")).render(<App/>);
  </script>
</body>
</html>
