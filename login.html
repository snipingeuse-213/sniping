<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8"/>
<meta name="viewport" content="width=device-width, initial-scale=1.0"/>
<title>Peekr — Log in</title>
<link rel="preconnect" href="https://fonts.googleapis.com"/>
<link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800&display=swap" rel="stylesheet"/>
<style>
*{box-sizing:border-box;margin:0;padding:0}
body{
  font-family:'Inter',-apple-system,BlinkMacSystemFont,sans-serif;
  background:#ffffff;
  color:#1a0a0f;
  min-height:100vh;
  display:flex;
  align-items:center;
  justify-content:center;
  position:relative;
  overflow:hidden;
}

/* ── Particle canvas ── */
#particleCanvas{position:fixed;inset:0;width:100%;height:100%;pointer-events:none;z-index:0;}

/* ── Auth card ── */
.auth-wrap{
  position:relative;z-index:1;
  width:100%;max-width:420px;
  padding:24px;
}
.auth-card{
  background:rgba(255,255,255,0.75);
  backdrop-filter:blur(24px) saturate(1.4);-webkit-backdrop-filter:blur(24px) saturate(1.4);
  border:1px solid rgba(255,45,120,0.1);
  border-radius:20px;
  padding:44px 36px;
  box-shadow:0 20px 60px rgba(0,0,0,0.06),0 0 0 1px rgba(255,45,120,0.05);
}
.auth-logo{
  font-family:'Inter',sans-serif;
  font-size:28px;font-weight:800;
  text-align:center;margin-bottom:8px;
  color:#1a0a0f;
}
.auth-logo span{color:#ff2d78;}
.auth-sub{
  text-align:center;font-size:14px;color:rgba(26,10,15,0.45);
  margin-bottom:32px;font-weight:500;
}
.auth-label{
  display:block;font-size:12px;font-weight:700;
  letter-spacing:.04em;color:rgba(26,10,15,0.55);
  margin-bottom:6px;text-transform:uppercase;
}
.auth-input{
  width:100%;padding:12px 14px;
  border:1.5px solid rgba(26,10,15,0.12);
  border-radius:10px;font-size:14px;
  font-family:'Inter',sans-serif;
  background:#fff;color:#1a0a0f;
  transition:all .2s;outline:none;
  margin-bottom:18px;
}
.auth-input:focus{
  border-color:#ff2d78;
  box-shadow:0 0 0 3px rgba(255,45,120,0.1);
}
.auth-input::placeholder{color:rgba(26,10,15,0.3);}

.auth-btn{
  width:100%;padding:13px;
  background:#ff2d78;color:#fff;
  border:none;border-radius:100px;
  font-size:14px;font-weight:700;
  font-family:'Inter',sans-serif;
  cursor:pointer;transition:all .2s;
  margin-top:6px;
  box-shadow:0 4px 20px rgba(255,45,120,0.3);
}
.auth-btn:hover{background:#e6265c;transform:translateY(-1px);box-shadow:0 6px 24px rgba(255,45,120,0.4);}
.auth-btn:active{transform:translateY(0);}
.auth-btn:disabled{opacity:.6;cursor:not-allowed;transform:none;}

.auth-footer{
  text-align:center;margin-top:24px;
  font-size:13px;color:rgba(26,10,15,0.45);
}
.auth-footer a{color:#ff2d78;font-weight:600;text-decoration:none;}
.auth-footer a:hover{text-decoration:underline;}

.auth-error{
  display:none;
  background:rgba(255,45,120,0.08);
  border:1px solid rgba(255,45,120,0.2);
  border-radius:10px;
  padding:10px 14px;
  font-size:13px;color:#cc2060;
  margin-bottom:16px;
  text-align:center;
}
.auth-error.show{display:block;}

.auth-divider{
  display:flex;align-items:center;gap:12px;
  margin:20px 0;
  font-size:11px;color:rgba(26,10,15,0.3);
  text-transform:uppercase;letter-spacing:.06em;font-weight:600;
}
.auth-divider::before,.auth-divider::after{
  content:'';flex:1;height:1px;background:rgba(26,10,15,0.08);
}

.forgot-link{
  display:block;text-align:right;
  font-size:12px;color:rgba(26,10,15,0.4);
  text-decoration:none;margin-top:-12px;margin-bottom:18px;
  font-weight:500;
}
.forgot-link:hover{color:#ff2d78;}
</style>
</head>
<body>

<canvas id="particleCanvas"></canvas>

<div class="auth-wrap">
  <div class="auth-card">
    <div class="auth-logo">Peek<span>r</span></div>
    <div class="auth-sub">Welcome back. Log in to your account.</div>

    <div class="auth-error" id="authError"></div>

    <form id="loginForm" onsubmit="handleLogin(event)">
      <label class="auth-label">Email</label>
      <input class="auth-input" type="email" id="email" placeholder="you@example.com" required autocomplete="email"/>

      <label class="auth-label">Password</label>
      <input class="auth-input" type="password" id="password" placeholder="Your password" required autocomplete="current-password"/>
      <a href="#" class="forgot-link" id="forgotLink">Forgot password?</a>

      <button type="submit" class="auth-btn" id="submitBtn">Log in</button>
    </form>

    <div class="auth-footer">
      Don't have an account? <a href="signup.html">Sign up free</a>
    </div>
  </div>
</div>

<script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
<script>
const _SB='https://vsyceexjsitliwaasdhd.supabase.co';
const _AK='eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6InZzeWNlZXhqc2l0bGl3YWFzZGhkIiwicm9sZSI6ImFub24iLCJpYXQiOjE3NzQ0NDgzNzYsImV4cCI6MjA5MDAyNDM3Nn0.nng6CrCZIYiW3i-b3z5hm6AXhepA8t1CUhZ1Kt4aZwo';
const sb=window.supabase.createClient(_SB,_AK);

/* Already logged in? → dashboard */
(async()=>{
  const {data:{session}}=await sb.auth.getSession();
  if(session) window.location.href='peekr-dashboard.html';
})();

async function handleLogin(e){
  e.preventDefault();
  const btn=document.getElementById('submitBtn');
  const errEl=document.getElementById('authError');
  errEl.classList.remove('show');
  btn.disabled=true;btn.textContent='Logging in...';

  const email=document.getElementById('email').value.trim();
  const password=document.getElementById('password').value;

  const {data,error}=await sb.auth.signInWithPassword({email,password});

  if(error){
    errEl.textContent=error.message;
    errEl.classList.add('show');
    btn.disabled=false;btn.textContent='Log in';
    return;
  }

  window.location.href='peekr-dashboard.html';
}

/* Forgot password */
document.getElementById('forgotLink').addEventListener('click',async(e)=>{
  e.preventDefault();
  const email=document.getElementById('email').value.trim();
  if(!email){alert('Enter your email first, then click Forgot password.');return;}
  const {error}=await sb.auth.resetPasswordForEmail(email,{redirectTo:window.location.origin+'/login.html'});
  if(error){alert(error.message);}
  else{alert('Password reset email sent! Check your inbox.');}
});
</script>

<!-- Particle network -->
<script>
(function(){
  const c=document.getElementById('particleCanvas');
  if(!c)return;
  const ctx=c.getContext('2d');
  let W,H,particles=[],mouse={x:-999,y:-999};
  const N=90,CD=200,MD=220;
  function resize(){W=c.width=window.innerWidth;H=c.height=window.innerHeight;}
  resize();window.addEventListener('resize',resize);
  document.addEventListener('mousemove',e=>{mouse.x=e.clientX;mouse.y=e.clientY;});
  document.addEventListener('mouseleave',()=>{mouse.x=-999;mouse.y=-999;});
  class P{
    constructor(){this.reset();}
    reset(){this.x=Math.random()*W;this.y=Math.random()*H;this.vx=(Math.random()-.5)*.3;this.vy=(Math.random()-.5)*.3;this.r=Math.random()*2+.8;this.ba=Math.random()*.3+.2;this.a=this.ba;this.p=Math.random()*Math.PI*2;this.ps=Math.random()*.02+.01;}
    update(){
      this.p+=this.ps;this.a=this.ba+Math.sin(this.p)*.08;
      const dx=mouse.x-this.x,dy=mouse.y-this.y,d=Math.sqrt(dx*dx+dy*dy);
      if(d<MD&&d>1){const f=.012*(1-d/MD);this.vx+=dx/d*f;this.vy+=dy/d*f;this.a=Math.min(.65,this.a+.12*(1-d/MD));}
      this.vx*=.99;this.vy*=.99;this.x+=this.vx;this.y+=this.vy;
      if(this.x<-20)this.x=W+20;if(this.x>W+20)this.x=-20;if(this.y<-20)this.y=H+20;if(this.y>H+20)this.y=-20;
    }
    draw(){
      ctx.beginPath();ctx.arc(this.x,this.y,this.r,0,Math.PI*2);ctx.fillStyle=`rgba(255,45,120,${this.a})`;ctx.fill();
      if(this.a>.25){ctx.beginPath();ctx.arc(this.x,this.y,this.r*3,0,Math.PI*2);ctx.fillStyle=`rgba(255,45,120,${this.a*.12})`;ctx.fill();}
    }
  }
  for(let i=0;i<N;i++)particles.push(new P());
  function draw(){
    ctx.clearRect(0,0,W,H);
    for(let i=0;i<particles.length;i++){
      particles[i].update();particles[i].draw();
      for(let j=i+1;j<particles.length;j++){
        const dx=particles[i].x-particles[j].x,dy=particles[i].y-particles[j].y,d=Math.sqrt(dx*dx+dy*dy);
        if(d<CD){const r=1-d/CD;ctx.beginPath();ctx.moveTo(particles[i].x,particles[i].y);ctx.lineTo(particles[j].x,particles[j].y);ctx.strokeStyle=`rgba(255,45,120,${.2*r})`;ctx.lineWidth=.5+r*.7;ctx.stroke();}
      }
      const mdx=mouse.x-particles[i].x,mdy=mouse.y-particles[i].y,md=Math.sqrt(mdx*mdx+mdy*mdy);
      if(md<MD){const r=1-md/MD;ctx.beginPath();ctx.moveTo(particles[i].x,particles[i].y);ctx.lineTo(mouse.x,mouse.y);ctx.strokeStyle=`rgba(255,45,120,${.4*r})`;ctx.lineWidth=.7+r;ctx.stroke();}
    }
    requestAnimationFrame(draw);
  }
  draw();
})();
</script>
</body>
</html>
