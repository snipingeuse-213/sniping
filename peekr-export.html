    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            background: #f0ece6;
            color: #1a0a0f;
            font-family: 'Figtree', sans-serif;
            font-weight: 400;
            display: flex;
            min-height: 100vh;
        }

        /* Sidebar */
        .sb {
            width: 220px;
            background: #1a0a0f;
            color: #f0ece6;
            padding: 24px 16px;
            display: flex;
            flex-direction: column;
            position: fixed;
            height: 100vh;
            overflow-y: auto;
            box-shadow: 2px 0 8px rgba(0,0,0,0.15);
        }

        .sb-logo {
            font-family: 'Clash Display', sans-serif;
            font-size: 24px;
            font-weight: 700;
            margin-bottom: 32px;
            color: #e8799a;
        }

        .sb-sec {
            margin-bottom: 24px;
        }

        .sb-lbl {
            font-size: 11px;
            font-weight: 700;
            text-transform: uppercase;
            letter-spacing: 0.8px;
            color: rgba(240,236,230,0.5);
            margin-bottom: 8px;
            display: block;
        }

        .ni {
            display: flex;
            align-items: center;
            gap: 12px;
            padding: 10px 12px;
            border-radius: 8px;
            cursor: pointer;
            transition: all 0.2s ease;
            text-decoration: none;
            color: rgba(240,236,230,0.75);
            font-size: 14px;
            margin-bottom: 4px;
            font-weight: 500;
        }

        .ni:hover {
            background: rgba(232,121,154,0.1);
            color: #e8799a;
        }

        .ni.active {
            background: #e8799a;
            color: #1a0a0f;
        }

        .ni-ico {
            font-size: 18px;
            width: 20px;
            text-align: center;
        }

        .nb {
            display: inline-block;
            background: #e8799a;
            color: #1a0a0f;
            font-size: 10px;
            font-weight: 700;
            padding: 2px 6px;
            border-radius: 3px;
            margin-left: auto;
        }

        .nb.s {
            font-size: 9px;
        }

        .sb-bot {
            margin-top: auto;
            padding-top: 20px;
            border-top: 1px solid rgba(240,236,230,0.1);
            display: flex;
            flex-direction: column;
            gap: 12px;
        }

        .uc {
            display: flex;
            align-items: center;
            gap: 10px;
            padding: 10px;
            background: rgba(232,121,154,0.1);
            border-radius: 8px;
            margin-bottom: 8px;
        }

        .ua {
            width: 32px;
            height: 32px;
            border-radius: 50%;
            background: #e8799a;
            display: flex;
            align-items: center;
            justify-content: center;
            font-weight: 700;
            font-size: 14px;
            color: #1a0a0f;
            flex-shrink: 0;
        }

        .un {
            font-weight: 600;
            font-size: 13px;
            color: #f0ece6;
        }

        .up {
            font-size: 11px;
            color: rgba(240,236,230,0.7);
        }

        /* Main Content */
        .main {
            margin-left: 220px;
            flex: 1;
            padding: 48px 64px;
            max-width: 1200px;
        }

        .header {
            margin-bottom: 48px;
            display: flex;
            justify-content: space-between;
            align-items: flex-start;
        }

        .header-text h1 {
            font-family: 'Clash Display', sans-serif;
            font-size: 48px;
            font-weight: 700;
            margin-bottom: 8px;
            color: #1a0a0f;
        }

        .header-text p {
            font-size: 16px;
            color: rgba(26,10,15,0.7);
        }

        .counter {
            text-align: right;
        }

        .counter-number {
            font-family: 'Clash Display', sans-serif;
            font-size: 28px;
            font-weight: 700;
            color: #e8799a;
            margin-bottom: 4px;
        }

        .counter-label {
            font-size: 12px;
            color: rgba(26,10,15,0.6);
        }

        /* Section */
        .section {
            margin-bottom: 40px;
            background: rgba(255,255,255,0.85);
            border: 1px solid rgba(200,160,170,0.18);
            border-radius: 12px;
            padding: 24px;
