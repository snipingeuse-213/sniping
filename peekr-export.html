<!DOCTYPE html>
<html lang="en">
  <head>
        <meta charset="UTF-8">
        <meta name="viewport" content="width=device-width, initial-scale=1.0">
        <title>Peekr - Export Tool</title>
      <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
      <style>
                body { font-family: 'Figtree', sans-serif; background: #f0ece6; color: #1a0a0f; padding: 20px; }
                .container { max-width: 1000px; margin: 0 auto; }
                h1 { font-size: 32px; margin-bottom: 20px; }
                .export-section { background: white; padding: 20px; border-radius: 8px; }
                .btn { background: #e8799a; color: white; padding: 10px 20px; border: none; border-radius: 6px; cursor: pointer; }
                .btn:hover { background: #d65885; }
                table { width: 100%; border-collapse: collapse; margin-top: 20px; }
                th, td { padding: 10px; text-align: left; border-bottom: 1px solid #ddd; }
                th { background: #f0ece6; }
            </style>
  </head>
  <body>
        <div class="container">
                  <h1>Peekr - Export Your Data</h1>
                <div class="export-section">
                            <p>Select format and export your shop database:</p>
                            <label><input type="radio" name="format" value="csv" checked> CSV</label>
                            <label><input type="radio" name="format" value="json"> JSON</label>
                            <label><input type="radio" name="format" value="xlsx"> Excel</label>
                            <button class="btn" onclick="exportData()">Export Now</button>button>
                            <div id="status"></div>div>
                </div>div>
                <table>
                              <thead>
                                                <tr>
                                                                      <th>Shop Name</th>
                                                  <th>URL</th>
                                                  <th>Country</th>
                                                  <th>Revenue</th>
                                                </tr>
                              </thead>
                            <tbody id="tableBody"></tbody>tbody>
                </table>
        </div>div>
      <script>
                const supabaseUrl = 'https://vsyceexjsitliwaasdhd.supabase.co';
                const supabaseKey = 'eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6InZzeWNlZXhqc2l0bGl3YWFzZGhkIiwicm9sZSI6ImFub24iLCJpYXQiOjE3MDg0MzA4MzUsImV4cCI6MTk5NzcwMzYzNX0.Z_-F0Z5H-DZ4N3BEi7TQJvx0WGWFrgfNEwYHSPKCfVQ';
                const supabase = window.supabase.createClient(supabaseUrl, supabaseKey);

                async function exportData() {
                              const format = document.querySelector('input[name="format"]:checked').value;
                              const status = document.getElementById('status');
                              status.textContent = 'Exporting...';

                              try {
                                                const { data, error } = await supabase.from('shops').select('*').limit(1000);
                                                if (error) throw error;

                                                const timestamp = new Date().toISOString().slice(0, 10);
                                                let content, filename, mimeType;

                                                if (format === 'csv') {
                                                                      let csv = 'Shop Name,URL,Country,Revenue\n';
                                                                      (data || []).forEach(row => {
                                                                                                csv += `${row.shop_name || ''},${row.shop_url || ''},${row.country || ''},${row.revenue || ''}\n`;
                                                                      });
                                                                      content = csv;
                                                                      filename = `peekr-${timestamp}.csv`;
                                                                      mimeType = 'text/csv';
                                                } else if (format === 'json') {
                                                                      content = JSON.stringify(data || [], null, 2);
                                                                      filename = `peekr-${timestamp}.json`;
                                                                      mimeType = 'application/json';
                                                } else {
                                                                      let csv = 'Shop Name,URL,Country,Revenue\n';
                                                                      (data || []).forEach(row => {
                                                                                                csv += `${row.shop_name || ''},${row.shop_url || ''},${row.country || ''},${row.revenue || ''}\n`;
                                                                      });
                                                                      content = csv;
                                                                      filename = `peekr-${timestamp}.xlsx`;
                                                                      mimeType = 'application/vnd.ms-excel';
                                                }

                                                const blob = new Blob([content], { type: mimeType });
                                                const url = URL.createObjectURL(blob);
                                                const a = document.createElement('a');
                                                a.href = url;
                                                a.download = filename;
                                                document.body.appendChild(a);
                                                a.click();
                                                URL.revokeObjectURL(url);
                                                document.body.removeChild(a);

                                                status.textContent = 'Export successful!';
                              } catch (error) {
                                                status.textContent = 'Error: ' + error.message;
                              }
                }
      </script>
  </body>
