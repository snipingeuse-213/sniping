    <style>
        :root{
          --neon:#ff2d78;
          --neon-soft:#ff5c9a;
          --neon-glow:rgba(255,45,120,0.35);
          --neon-glow2:rgba(255,45,120,0.15);
          --neon-glow3:rgba(255,45,120,0.08);
        }

        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            font-family: 'Inter', -apple-system, BlinkMacSystemFont, sans-serif;
            background-color: #ffffff;
            color: #1a0a0f;
            overflow: hidden;
        }

        .wrapper {
            display: flex;
            height: 100vh;
        }

        /* Sidebar Styles */
/* ── SIDEBAR NEON ROSE ── */
.sb{width:220px;background:#0a0a0f;display:flex;flex-direction:column;overflow-y:auto;overflow-x:hidden;position:fixed;left:0;top:0;height:100vh;z-index:20;border-right:1px solid rgba(255,45,120,0.08);}
.sb::-webkit-scrollbar{width:3px;}
.sb::-webkit-scrollbar-thumb{background:rgba(255,45,120,0.2);border-radius:3px;}
.sb-logo{padding:16px 18px 14px;border-bottom:1px solid rgba(255,45,120,0.1);position:relative;}
.sb-logo::after{content:'';position:absolute;bottom:-1px;left:16px;right:16px;height:1px;background:linear-gradient(90deg,transparent,rgba(255,45,120,0.35),transparent);}
.sb-logo img{height:32px;width:auto;}
.sb-sec{padding:10px 0 2px;}
.sb-lbl{font-size:10px;font-weight:800;letter-spacing:.1em;text-transform:uppercase;color:rgba(255,255,255,0.25);padding:0 16px 5px;}
.ni{display:flex;align-items:center;gap:9px;padding:8px 16px;font-size:12px;font-weight:500;color:rgba(255,255,255,0.85);cursor:pointer;transition:all .15s;position:relative;white-space:nowrap;text-decoration:none;}
.ni:hover{color:#ffffff;background:rgba(255,255,255,0.06);}
.ni:hover .ni-ico{background:rgba(255,255,255,0.08);border-color:rgba(255,255,255,0.15);}
.ni.active{color:var(--neon-soft,#ff5c9a);background:rgba(255,45,120,0.12);font-weight:700;}
.ni.active::before{content:'';position:absolute;left:0;top:4px;bottom:4px;width:3px;background:var(--neon,#ff2d78);border-radius:0 3px 3px 0;box-shadow:0 0 8px rgba(255,45,120,0.35);}
.ni-ico{width:26px;height:26px;border-radius:7px;background:rgba(255,255,255,0.05);border:1px solid rgba(255,255,255,0.08);display:flex;align-items:center;justify-content:center;flex-shrink:0;font-size:13px;transition:all .15s;}
.ni.active .ni-ico{background:rgba(255,45,120,0.15);border-color:rgba(255,45,120,0.3);box-shadow:0 0 8px rgba(255,45,120,0.15);}
.nb{margin-left:auto;background:var(--neon,#ff2d78);color:#fff;font-size:10px;font-weight:800;padding:1px 7px;border-radius:20px;box-shadow:0 0 10px rgba(255,45,120,0.35);}
.nb.s{background:rgba(255,255,255,0.08);color:rgba(255,255,255,0.3);box-shadow:none;}
.sb-bot{margin-top:auto;border-top:1px solid rgba(255,45,120,0.08);padding:12px;}
.uc{display:flex;align-items:center;gap:10px;padding:10px 12px;background:rgba(255,255,255,0.05);border:1px solid rgba(255,45,120,0.1);border-radius:12px;cursor:pointer;transition:all .15s;}
.uc:hover{background:rgba(255,45,120,0.08);border-color:rgba(255,45,120,0.2);}
.ua{width:30px;height:30px;border-radius:50%;background:linear-gradient(135deg,var(--neon,#ff2d78),var(--neon-soft,#ff5c9a));display:flex;align-items:center;justify-content:center;font-size:12px;font-weight:800;color:#fff;flex-shrink:0;box-shadow:0 0 12px rgba(255,45,120,0.35);}
.un{font-size:12px;font-weight:700;color:rgba(255,255,255,0.85);}
.up{font-size:10px;color:var(--neon-soft,#ff5c9a);font-weight:700;}

        /* Shop Table */
        .shops-table {
            width: 100%;
            border-collapse: collapse;
        }

        .shops-table thead {
            background: rgba(232, 121, 154, 0.08);
            border-bottom: 2px solid rgba(232, 121, 154, 0.2);
        }

        .shops-table th {
            padding: 16px 12px;
            text-align: left;
            font-size: 13px;
            font-weight: 600;
            color: rgba(26, 10, 15, 0.7);
            text-transform: uppercase;
            letter-spacing: 0.5px;
        }

        .shops-table tbody tr {
            border-bottom: 1px solid rgba(232, 121, 154, 0.1);
            transition: background 0.3s ease;
        }

        .shops-table tbody tr:hover {
            background: rgba(232, 121, 154, 0.05);
        }

        .shops-table td {
            padding: 16px 12px;
            font-size: 14px;
            color: #1a0a0f;
        }

        .shop-name {
            font-weight: 600;
            color: #e8799a;
        }

        .shop-score {
            background: rgba(232, 121, 154, 0.1);
            padding: 4px 10px;
            border-radius: 4px;
            font-weight: 600;
            font-size: 13px;
            color: #d4607a;
            display: inline-block;
        }

        .shop-visits {
            color: rgba(26, 10, 15, 0.6);
            font-size: 13px;
        }

        .shop-revenue {
            color: rgba(26, 10, 15, 0.6);
            font-size: 13px;
        }

        .shop-actions {
            text-align: right;
        }

        /* Empty State */
        .empty-state {
            text-align: center;
            padding: 60px 40px;
            color: rgba(26, 10, 15, 0.6);
        }

        .empty-icon {
            font-size: 64px;
            margin-bottom: 20px;
            opacity: 0.5;
        }

        .empty-title {
            font-size: 20px;
            font-weight: 600;
            color: #1a0a0f;
            margin-bottom: 12px;
        }

        .empty-text {
            font-size: 14px;
            margin-bottom: 28px;
            line-height: 1.6;
        }

        .empty-cta {
            display: inline-flex;
            gap: 12px;
        }

        .cta-btn {
            padding: 10px 20px;
            border-radius: 8px;
            text-decoration: none;
            font-weight: 600;
            font-size: 14px;
            transition: all 0.3s ease;
            cursor: pointer;
            border: none;
            font-family: 'Inter', -apple-system, BlinkMacSystemFont, sans-serif;
        }

        .cta-btn-primary {
            background: #e8799a;
            color: #ffffff;
        }

        .cta-btn-primary:hover {
            background: #d4607a;
            box-shadow: 0 4px 12px rgba(232, 121, 154, 0.3);
        }

        .cta-btn-secondary {
            background: rgba(232, 121, 154, 0.1);
            color: #e8799a;
            border: 1px solid rgba(232, 121, 154, 0.3);
        }

        .cta-btn-secondary:hover {
            background: rgba(232, 121, 154, 0.2);
            border-color: #e8799a;
        }

        /* Floating Objects */
        .page-objects {
            position: fixed;
            width: 100%;
            height: 100%;
            top: 0;
            left: 0;
            pointer-events: none;
            overflow: hidden;
        }

        .obj {
            position: absolute;
            opacity: 0.04;
        }

        .obj-1 {
            width: 400px;
            height: 400px;
            background: radial-gradient(circle, #e8799a, transparent);
            border-radius: 50%;
            top: -100px;
            right: -100px;
        }

        .obj-2 {
            width: 300px;
            height: 300px;
            background: radial-gradient(circle, #d4607a, transparent);
            border-radius: 50%;
            bottom: -50px;
            left: 50px;
        }

        .obj-3 {
            width: 250px;
            height: 250px;
            background: radial-gradient(circle, #f4a7b9, transparent);
            border-radius: 50%;
            top: 50%;
            right: 10%;
        }

        /* Scrollbar for tab content */
        .tab-content::-webkit-scrollbar {
            width: 8px;
        }

        .tab-content::-webkit-scrollbar-track {
            background: transparent;
        }

        .tab-content::-webkit-scrollbar-thumb {
            background: rgba(232, 121, 154, 0.2);
            border-radius: 4px;
        }

        .tab-content::-webkit-scrollbar-thumb:hover {

        }

        /* Loading State */
        .loading {
            display: flex;
            align-items: center;
            justify-content: center;
            height: 300px;

            height: 24px;

            border-top-color: #e8799a;
            border-radius: 50%;
            animation: spin 0.6s linear infinite;
            margin-right: 12px;
        }

        @keyframes spin {
            to { transform: rotate(360deg); }
        }

        .main{margin-left:220px;flex:1;display:flex;flex-direction:column;overflow-y:auto;height:100vh;background:#fff;}
        .hidden{display:none !important;}

        .main-header {

            min-height: 56px;

        .tab.active {

            border-bottom-color: #e8799a;
        }

        /* Tab Content */
        .tab-content {
            flex: 1;
            overflow-y: auto;
            padding: 24px;
        }

        /* Ad Cards */
        .ad-card {
            background: #ffffff;
            border: 1px solid rgba(200,160,170,0.18);
            border-radius: 12px;
            padding: 0;
            margin-bottom: 16px;
            overflow: hidden;
            transition: box-shadow 0.2s;
        }

        .ad-card:hover {
            box-shadow: 0 4px 16px rgba(200,160,170,0.12);
        }

        .ad-header {
            padding: 16px 20px 12px;
            border-bottom: 1px solid rgba(200,160,170,0.10);
        }

        .ad-shop-info {
            display: flex;
            align-items: center;
            gap: 12px;
        }

        .ad-domain {
            font-size: 14px;
            font-weight: 600;
            color: #1a0a0f;
        }

        .ad-page-name {
            font-size: 12px;
            color: rgba(26,10,15,0.35);
        }

        .ad-body {
            padding: 16px 20px;
            font-size: 14px;
            line-height: 1.6;
            color: rgba(26,10,15,0.6);
        }

        .ad-footer {
            display: flex;
            align-items: center;
            justify-content: space-between;
            padding: 12px 20px;
            border-top: 1px solid rgba(200,160,170,0.10);
            background: rgba(232,121,154,0.03);
        }

        .ad-actions {
            display: flex;
            align-items: center;
            gap: 8px;
        }

        .ad-link {
            font-size: 13px;
            font-weight: 600;
            color: #e8799a;
            text-decoration: none;
            transition: color 0.2s;
        }

        .ad-link:hover {
            color: #d4607a;
            text-decoration: underline;
        }

        /* Unsave Button */
        .unsave-btn {
            padding: 6px 14px;
            font-family: 'Inter', -apple-system, BlinkMacSystemFont, sans-serif;
            font-size: 12px;
            font-weight: 600;
            color: rgba(26,10,15,0.35);
            background: none;
            border: 1px solid rgba(200,160,170,0.18);
            border-radius: 6px;
            cursor: pointer;
            transition: all 0.2s;
        }

        .unsave-btn:hover {
            color: #d4607a;
            border-color: #d4607a;
            background: rgba(232,121,154,0.06);
        }

        /* Shop Card (for potential card-based layout) */
        .shop-card {
            background: #ffffff;
            border: 1px solid rgba(200,160,170,0.18);
            border-radius: 12px;
            padding: 20px;
            margin-bottom: 16px;
            transition: box-shadow 0.2s;
        }

        .shop-card:hover {
            box-shadow: 0 4px 16px rgba(200,160,170,0.12);
        }

        .shop-info {
            display: flex;
            align-items: center;
            gap: 12px;
        }

        .shop-domain {
            font-size: 12px;
            color: rgba(26,10,15,0.35);
        }

        .shop-meta {
            display: flex;
            align-items: center;
            gap: 16px;
            margin-top: 12px;
            font-size: 13px;
            color: rgba(26,10,15,0.6);
        }

        .shop-stats {
            display: flex;
            align-items: center;
            gap: 20px;
            margin-top: 12px;
        }
    </style>

    <script>
        const SUPABASE_URL = 'https://vsyceexjsitliwaasdhd.supabase.co';
        const SUPABASE_ANON_KEY = 'eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6InZzeWNlZXhqc2l0bGl3YWFzZGhkIiwicm9sZSI6ImFub24iLCJpYXQiOjE3NzQ0NDgzNzYsImV4cCI6MjA5MDAyNDM3Nn0.nng6CrCZIYiW3i-b3z5hm6AXhepA8t1CUhZ1Kt4aZwo';

        let currentTab = 'ads';
        let savedAds = [];
        let savedShops = [];

        // Initialize on page load
        document.addEventListener('DOMContentLoaded', async () => {
            await loadSavedAds();
            await loadSavedShops();
            setupTabListeners();
        });

        function setupTabListeners() {
            document.querySelectorAll('.tab').forEach(tab => {
                tab.addEventListener('click', () => {
                    document.querySelectorAll('.tab').forEach(t => t.classList.remove('active'));
                    document.querySelectorAll('.tab-content').forEach(tc => tc.classList.add('hidden'));

                    tab.classList.add('active');
                    currentTab = tab.dataset.tab;
                    document.getElementById(currentTab + '-tab').classList.remove('hidden');
                });
            });
        }

        async function loadSavedAds() {
            const container = document.getElementById('ads-container');
            container.innerHTML = '<div class="loading"><div class="spinner"></div>Loading saved ads...</div>';

            try {
                const response = await fetch(
                    `${SUPABASE_URL}/rest/v1/saved_ads?select=*`,
                    {
                        headers: {
                            'apikey': SUPABASE_ANON_KEY,
                            'Accept': 'application/json',
                        }
                    }
                );

                if (!response.ok) {
                    // Table might not exist yet — show empty state instead of error
                    savedAds = [];
                    renderSavedAds();
                    return;
                }
                savedAds = await response.json();
                renderSavedAds();
            } catch (error) {
                console.error('Error loading saved ads:', error);
                savedAds = [];
                renderSavedAds();
            }
        }

        function renderSavedAds() {
            const container = document.getElementById('ads-container');

            if (savedAds.length === 0) {
                container.innerHTML = `
                    <div class="empty-state">
                        <div class="empty-icon"></div>
                        <div class="empty-title">No Saved Ads Yet</div>
                        <div class="empty-text">Start saving your favorite ads to build your collection.<br>Explore trending ads or shops to get started.</div>
                        <div class="empty-cta">
                            <a href="peekr-trending-ads.html" class="cta-btn cta-btn-primary">Browse Trending Ads</a>
                            <a href="peekr-dashboard.html" class="cta-btn cta-btn-secondary">View Shops</a>
                        </div>
                    </div>
                `;
                return;
            }

            container.innerHTML = savedAds.map(ad => `
                <div class="ad-card">
                    <div class="ad-header">
                        <div class="ad-shop-info">
                            <div class="ad-domain">${ad.shop_domain || 'Unknown Domain'}</div>
                            <div class="ad-page-name">${ad.page_name || 'Ad'}</div>
                        </div>
                    </div>
                    <div class="ad-body">${ad.ad_creative_body || 'No description available'}</div>
                    <div class="ad-footer">
                        <div class="ad-actions">
                            ${ad.ad_snapshot_url ? `
                                <a href="${ad.ad_snapshot_url}" target="_blank" class="ad-link">View Screenshot</a>
                            ` : ''}
                        </div>
                        <button class="unsave-btn" onclick="unsaveAd(${ad.id})">Unsave</button>
                    </div>
                </div>
            `).join('');
        }

        async function loadSavedShops() {
            const container = document.getElementById('shops-container');
            container.innerHTML = '<div class="loading"><div class="spinner"></div>Loading saved shops...</div>';

            try {
                const response = await fetch(
                    `${SUPABASE_URL}/rest/v1/saved_shops?select=*`,
                    {
                        headers: {
                            'apikey': SUPABASE_ANON_KEY,
                            'Accept': 'application/json',
                        }
                    }
                );

                if (!response.ok) {
                    savedShops = [];
                    renderSavedShops();
                    return;
                }
                savedShops = await response.json();
                await enrichShopsData();
                renderSavedShops();
            } catch (error) {
                console.error('Error loading saved shops:', error);
                savedShops = [];
                renderSavedShops();
            }
        }

        async function enrichShopsData() {
            for (let shop of savedShops) {
                if (shop.shop_domain) {
                    try {
                        const response = await fetch(
                            `${SUPABASE_URL}/rest/v1/shops?domain=eq.${encodeURIComponent(shop.shop_domain)}&select=*`,
                            {
                                headers: {
                                    'apikey': SUPABASE_ANON_KEY,
                                    'Content-Type': 'application/json',
                                }
                            }
                        );

                        if (response.ok) {
                            const data = await response.json();
                            if (data.length > 0) {
                                shop.shopData = data[0];
                            }
                        }
                    } catch (error) {
                        console.error(`Error fetching shop data for ${shop.shop_domain}:`, error);
                    }
                }
            }
        }

        function renderSavedShops() {
            const container = document.getElementById('shops-container');

            if (savedShops.length === 0) {
                container.innerHTML = `
                    <div class="empty-state">
                        <div class="empty-icon"></div>
                        <div class="empty-title">No Saved Shops Yet</div>
                        <div class="empty-text">Start saving your favorite shops to track their performance.<br>Explore trending shops to find ones worth following.</div>
                        <div class="empty-cta">
                            <a href="peekr-dashboard.html" class="cta-btn cta-btn-primary">Explore Trending Shops</a>
                            <a href="peekr-trending-ads.html" class="cta-btn cta-btn-secondary">View Trending Ads</a>
                        </div>
                    </div>
                `;
                return;
            }

            container.innerHTML = `
                <table class="shops-table">
                    <thead>
                        <tr>
                            <th>Shop Name</th>
                            <th>Score</th>
                            <th>Country</th>
                            <th>Monthly Visits</th>
                            <th>Est. Revenue</th>
                            <th></th>
                        </tr>
                    </thead>
                    <tbody>
                        ${savedShops.map(shop => `
                            <tr>
                                <td>
                                    <div class="shop-name">${shop.shopData?.name || shop.shop_domain}</div>
                                    <div style="font-size: 12px; color: rgba(26, 10, 15, 0.5); margin-top: 4px;">${shop.shop_domain}</div>
                                </td>
                                <td>
                                    ${shop.shopData?.score ? `<div class="shop-score">${shop.shopData.score.toFixed(1)}</div>` : '<span style="color: rgba(26, 10, 15, 0.5);">-</span>'}
                                </td>
                                <td>${shop.shopData?.country || '-'}</td>
                                <td><div class="shop-visits">${shop.shopData?.monthly_visits ? shop.shopData.monthly_visits.toLocaleString() : '-'}</div></td>
                                <td><div class="shop-revenue">${shop.shopData?.estimated_revenue ? '$' + shop.shopData.estimated_revenue.toLocaleString() : '-'}</div></td>
                                <td class="shop-actions">
                                    <button class="unsave-btn" onclick="unsaveShop(${shop.id})">Unsave</button>
                                </td>
                            </tr>
                        `).join('')}
                    </tbody>
                </table>
            `;
        }

        async function unsaveAd(adId) {
            try {
                const response = await fetch(
                    `${SUPABASE_URL}/rest/v1/saved_ads?id=eq.${adId}`,
                    {
                        method: 'DELETE',
                        headers: {
                            'apikey': SUPABASE_ANON_KEY,
                            'Content-Type': 'application/json',
                        }
                    }
                );

                if (response.ok) {
                    savedAds = savedAds.filter(ad => ad.id !== adId);
                    renderSavedAds();
                } else {
                    alert('Failed to unsave ad');
                }
            } catch (error) {
                console.error('Error unsaving ad:', error);
                alert('Error unsaving ad');
            }
        }

        async function unsaveShop(shopId) {
            try {
                const response = await fetch(
                    `${SUPABASE_URL}/rest/v1/saved_shops?id=eq.${shopId}`,
                    {
                        method: 'DELETE',
                        headers: {
                            'apikey': SUPABASE_ANON_KEY,
                            'Content-Type': 'application/json',
                        }
                    }
                );

                if (response.ok) {
                    savedShops = savedShops.filter(shop => shop.id !== shopId);
                    renderSavedShops();
                } else {
                    alert('Failed to unsave shop');
                }
            } catch (error) {
                console.error('Error unsaving shop:', error);
                alert('Error unsaving shop');
            }
        }
    </script>
</body>
</html>
