<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Saved Items - Peekr</title>
    <link href="https://fonts.googleapis.com/css2?family=Figtree:wght@400;500;600;700&display=swap" rel="stylesheet">
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            font-family: 'Figtree', sans-serif;
            background-color: #f0ece6;
            color: #1a0a0f;
            overflow: hidden;
        }

        .wrapper {
            display: flex;
            height: 100vh;
        }

        /* Sidebar Styles */
        .sb {
            width: 220px;
            background: #1a0a0f;
            color: #f0ece6;
            padding: 24px 16px;
            overflow-y: auto;
            display: flex;
            flex-direction: column;
            box-shadow: 0 0 30px rgba(232, 121, 154, 0.1);
        }

        .sb-logo {
            margin-bottom: 32px;
            padding-bottom: 24px;
            border-bottom: 1px solid rgba(232, 121, 154, 0.2);
        }

        .sb-logo img {
            width: 100%;
            height: auto;
        }

        .sb-sec {
            margin-bottom: 28px;
        }

        .sb-lbl {
            font-size: 11px;
            font-weight: 700;
            text-transform: uppercase;
            letter-spacing: 0.5px;
            color: rgba(240, 236, 230, 0.6);
            margin-bottom: 12px;
            padding: 0 8px;
        }

        .ni {
            display: flex;
            align-items: center;
            gap: 12px;
            padding: 10px 12px;
            border-radius: 8px;
            text-decoration: none;
            color: rgba(240, 236, 230, 0.8);
            font-size: 14px;
            transition: all 0.3s ease;
            margin-bottom: 6px;
            position: relative;
        }

        .ni:hover {
            background: rgba(232, 121, 154, 0.15);
            color: #f0ece6;
        }

        .ni.active {
            background: rgba(232, 121, 154, 0.25);
            color: #e8799a;
            font-weight: 600;
        }

        .ni-ico {
            font-size: 18px;
        }

        .nb {
            margin-left: auto;
            background: #e8799a;
            color: #1a0a0f;
            padding: 2px 8px;
            border-radius: 4px;
            font-size: 10px;
            font-weight: 700;
            text-transform: uppercase;
        }

        .nb.s {
            background: rgba(232, 121, 154, 0.3);
            color: rgba(240, 236, 230, 0.7);
        }

        .sb-bot {
            margin-top: auto;
            padding-top: 20px;
            border-top: 1px solid rgba(232, 121, 154, 0.2);
        }

        .uc {
            display: flex;
            align-items: center;
            gap: 12px;
            padding: 12px;
            border-radius: 8px;
            background: rgba(232, 121, 154, 0.1);
        }

        .ua {
            width: 40px;
            height: 40px;
            border-radius: 50%;
            background: linear-gradient(135deg, #e8799a, #d4607a);
            display: flex;
            align-items: center;
            justify-content: center;
            color: #f0ece6;
            font-weight: 700;
            font-size: 14px;
        }

        .un {
            font-size: 13px;
            font-weight: 600;
            color: #f0ece6;
        }

        .up {
            font-size: 11px;
            color: rgba(240, 236, 230, 0.6);
        }

        /* Scrollbar */
        .sb::-webkit-scrollbar {
            width: 6px;
        }

        .sb::-webkit-scrollbar-track {
            background: transparent;
        }

        .sb::-webkit-scrollbar-thumb {
            background: rgba(232, 121, 154, 0.3);
            border-radius: 3px;
        }

        .sb::-webkit-scrollbar-thumb:hover {
            background: rgba(232, 121, 154, 0.5);
        }

        /* Main Content */
        .main {
            flex: 1;
            display: flex;
            flex-direction: column;
            position: relative;
            overflow: hidden;
        }

        .main-header {
            padding: 28px 36px;
            background: #ffffff;
            border-bottom: 1px solid rgba(232, 121, 154, 0.1);
            z-index: 10;
        }

        .main-header h1 {
            font-size: 28px;
            font-weight: 700;
            color: #1a0a0f;
            margin-bottom: 8px;
        }

        .main-header p {
            font-size: 14px;
            color: rgba(26, 10, 15, 0.6);
        }

        .tabs {
            display: flex;
            gap: 0;
            padding: 0 36px;
            background: #ffffff;
            border-bottom: 1px solid rgba(232, 121, 154, 0.1);
        }

        .tab {
            padding: 16px 20px;
            background: none;
            border: none;
            color: rgba(26, 10, 15, 0.6);
            font-size: 14px;
            font-weight: 500;
            cursor: pointer;
            position: relative;
            transition: color 0.3s ease;
            font-family: 'Figtree', sans-serif;
        }

        .tab:hover {
            color: #1a0a0f;
        }

        .tab.active {
            color: #e8799a;
            font-weight: 600;
        }

        .tab.active::after {
            content: '';
            position: absolute;
            bottom: -1px;
            left: 0;
            right: 0;
            height: 3px;
            background: #e8799a;
        }

        .tab-content {
            flex: 1;
            overflow-y: auto;
            padding: 32px 36px;
        }

        .tab-content.hidden {
            display: none;
        }

        /* Cards */
        .ad-card {
            background: rgba(255, 255, 255, 0.7);
            backdrop-filter: blur(10px);
            border: 1px solid rgba(232, 121, 154, 0.2);
            border-radius: 12px;
            padding: 20px;
            margin-bottom: 16px;
            transition: all 0.3s ease;
        }

        .ad-card:hover {
            background: rgba(255, 255, 255, 0.9);
            border-color: rgba(232, 121, 154, 0.4);
            box-shadow: 0 8px 32px rgba(232, 121, 154, 0.1);
        }

        .ad-header {
            display: flex;
            justify-content: space-between;
            align-items: start;
            margin-bottom: 16px;
        }

        .ad-shop-info {
            flex: 1;
        }

        .ad-domain {
            font-size: 13px;
            color: rgba(26, 10, 15, 0.5);
            text-transform: uppercase;
            letter-spacing: 0.5px;
            font-weight: 600;
            margin-bottom: 4px;
        }

        .ad-page-name {
            font-size: 15px;
            font-weight: 600;
            color: #1a0a0f;
        }

        .ad-body {
            background: rgba(232, 121, 154, 0.05);
            border-left: 3px solid #e8799a;
            padding: 12px;
            border-radius: 6px;
            margin-bottom: 12px;
            font-size: 14px;
            line-height: 1.4;
            color: #1a0a0f;
            max-height: 80px;
            overflow: hidden;
            display: -webkit-box;
            -webkit-line-clamp: 3;
            -webkit-box-orient: vertical;
        }

        .ad-footer {
            display: flex;
            justify-content: space-between;
            align-items: center;
        }

        .ad-actions {
            display: flex;
            gap: 10px;
        }

        .ad-link {
            font-size: 13px;
            padding: 8px 14px;
            background: rgba(232, 121, 154, 0.1);
            border: 1px solid rgba(232, 121, 154, 0.3);
            border-radius: 6px;
            color: #e8799a;
            text-decoration: none;
            cursor: pointer;
            transition: all 0.3s ease;
            font-weight: 500;
        }

        .ad-link:hover {
            background: rgba(232, 121, 154, 0.2);
            border-color: #e8799a;
        }

        .unsave-btn {
            font-size: 13px;
            padding: 8px 14px;
            background: rgba(212, 96, 122, 0.1);
            border: 1px solid rgba(212, 96, 122, 0.3);
            border-radius: 6px;
            color: #d4607a;
            cursor: pointer;
            transition: all 0.3s ease;
            font-weight: 500;
            font-family: 'Figtree', sans-serif;
        }

        .unsave-btn:hover {
            background: rgba(212, 96, 122, 0.2);
            border-color: #d4607a;
        }

        /* Shop Table */
        .shops-table {
            width: 100%;
            border-collapse: collapse;
        }

        .shops-table thead {
            background: rgba(232, 121, 154, 0.08);
            border-bottom: 2px solid rgba(232, 121, 154, 0.2);
        }

        .shops-table th {
            padding: 16px 12px;
            text-align: left;
            font-size: 13px;
            font-weight: 600;
            color: rgba(26, 10, 15, 0.7);
            text-transform: uppercase;
            letter-spacing: 0.5px;
        }

        .shops-table tbody tr {
            border-bottom: 1px solid rgba(232, 121, 154, 0.1);
            transition: background 0.3s ease;
        }

        .shops-table tbody tr:hover {
            background: rgba(232, 121, 154, 0.05);
        }

        .shops-table td {
            padding: 16px 12px;
            font-size: 14px;
            color: #1a0a0f;
        }

        .shop-name {
            font-weight: 600;
            color: #e8799a;
        }

        .shop-score {
            background: rgba(232, 121, 154, 0.1);
            padding: 4px 10px;
            border-radius: 4px;
            font-weight: 600;
            font-size: 13px;
            color: #d4607a;
            display: inline-block;
        }

        .shop-visits {
            color: rgba(26, 10, 15, 0.6);
            font-size: 13px;
        }

        .shop-revenue {
            color: rgba(26, 10, 15, 0.6);
            font-size: 13px;
        }

        .shop-actions {
            text-align: right;
        }

        /* Empty State */
        .empty-state {
            text-align: center;
            padding: 60px 40px;
            color: rgba(26, 10, 15, 0.6);
        }

        .empty-icon {
            font-size: 64px;
            margin-bottom: 20px;
            opacity: 0.5;
        }

        .empty-title {
            font-size: 20px;
            font-weight: 600;
            color: #1a0a0f;
            margin-bottom: 12px;
        }

        .empty-text {
            font-size: 14px;
            margin-bottom: 28px;
            line-height: 1.6;
        }

        .empty-cta {
            display: inline-flex;
            gap: 12px;
        }

        .cta-btn {
            padding: 10px 20px;
            border-radius: 8px;
            text-decoration: none;
            font-weight: 600;
            font-size: 14px;
            transition: all 0.3s ease;
            cursor: pointer;
            border: none;
            font-family: 'Figtree', sans-serif;
        }

        .cta-btn-primary {
            background: #e8799a;
            color: #f0ece6;
        }

        .cta-btn-primary:hover {
            background: #d4607a;
            box-shadow: 0 4px 12px rgba(232, 121, 154, 0.3);
        }

        .cta-btn-secondary {
            background: rgba(232, 121, 154, 0.1);
            color: #e8799a;
            border: 1px solid rgba(232, 121, 154, 0.3);
        }

        .cta-btn-secondary:hover {
            background: rgba(232, 121, 154, 0.2);
            border-color: #e8799a;
        }

        /* Floating Objects */
        .page-objects {
            position: fixed;
            width: 100%;
            height: 100%;
            top: 0;
            left: 0;
            pointer-events: none;
            overflow: hidden;
        }

        .obj {
            position: absolute;
            opacity: 0.04;
        }

        .obj-1 {
            width: 400px;
            height: 400px;
            background: radial-gradient(circle, #e8799a, transparent);
            border-radius: 50%;
            top: -100px;
            right: -100px;
        }

        .obj-2 {
            width: 300px;
            height: 300px;
            background: radial-gradient(circle, #d4607a, transparent);
            border-radius: 50%;
            bottom: -50px;
            left: 50px;
        }

        .obj-3 {
            width: 250px;
            height: 250px;
            background: radial-gradient(circle, #f4a7b9, transparent);
            border-radius: 50%;
            top: 50%;
            right: 10%;
        }

        /* Scrollbar for tab content */
        .tab-content::-webkit-scrollbar {
            width: 8px;
        }

        .tab-content::-webkit-scrollbar-track {
            background: transparent;
        }

        .tab-content::-webkit-scrollbar-thumb {
            background: rgba(232, 121, 154, 0.2);
            border-radius: 4px;
        }

        .tab-content::-webkit-scrollbar-thumb:hover {
            background: rgba(232, 121, 154, 0.4);
        }

        /* Loading State */
        .loading {
            display: flex;
            align-items: center;
            justify-content: center;
            height: 300px;
            color: rgba(26, 10, 15, 0.6);
            font-size: 14px;
        }

        .spinner {
            width: 24px;
            height: 24px;
            border: 3px solid rgba(232, 121, 154, 0.2);
            border-top-color: #e8799a;
            border-radius: 50%;
            animation: spin 0.6s linear infinite;
            margin-right: 12px;
        }

        @keyframes spin {
            to { transform: rotate(360deg); }
        }
    </style>
</head>

        <div class="obj obj-2"></div>

    <script>
        const SUPABASE_URL = 'https://vsyceexjsitliwaasdhd.supabase.co';
        const SUPABASE_ANON_KEY = 'eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6InZzeWNlZXhqc2l0bGl3YWFzZGhkIiwicm9sZSI6ImFub24iLCJpYXQiOjE3NzQ0NDgzNzYsImV4cCI6MjA5MDAyNDM3Nn0.nng6CrCZIYiW3i-b3z5hm6AXhepA8t1CUhZ1Kt4aZwo';

        let currentTab = 'ads';
        let savedAds = [];
        let savedShops = [];

        // Initialize on page load
        document.addEventListener('DOMContentLoaded', async () => {
            await loadSavedAds();
            await loadSavedShops();
            setupTabListeners();
        });

        function setupTabListeners() {
            document.querySelectorAll('.tab').forEach(tab => {
                tab.addEventListener('click', () => {
                    document.querySelectorAll('.tab').forEach(t => t.classList.remove('active'));
                    document.querySelectorAll('.tab-content').forEach(tc => tc.classList.add('hidden'));

                    tab.classList.add('active');
                    currentTab = tab.dataset.tab;
                    document.getElementById(currentTab + '-tab').classList.remove('hidden');
                });
            });
        }

        async function loadSavedAds() {
            const container = document.getElementById('ads-container');
            container.innerHTML = '<div class="loading"><div class="spinner"></div>Loading saved ads...</div>';

            try {
                const response = await fetch(
                    `${SUPABASE_URL}/rest/v1/saved_ads?select=*`,
                    {
                        headers: {
                            'apikey': SUPABASE_ANON_KEY,
                            'Accept': 'application/json',
                        }
                    }
                );

                if (!response.ok) {
                    // Table might not exist yet — show empty state instead of error
                    savedAds = [];
                    renderSavedAds();
                    return;
                }
                savedAds = await response.json();
                renderSavedAds();
            } catch (error) {
                console.error('Error loading saved ads:', error);
                savedAds = [];
                renderSavedAds();
            }
        }

        function renderSavedAds() {
            const container = document.getElementById('ads-container');

            if (savedAds.length === 0) {
                container.innerHTML = `
                    <div class="empty-state">
                        <div class="empty-icon">&#128204;</div>
                        <div class="empty-title">No Saved Ads Yet</div>
                        <div class="empty-text">Start saving your favorite ads to build your collection.<br>Explore trending ads or shops to get started.</div>
                        <div class="empty-cta">
                            <a href="peekr-trending-ads.html" class="cta-btn cta-btn-primary">Browse Trending Ads</a>
                            <a href="peekr-dashboard.html" class="cta-btn cta-btn-secondary">View Shops</a>
                        </div>
                    </div>
                `;
                return;
            }

            container.innerHTML = savedAds.map(ad => `
                <div class="ad-card">
                    <div class="ad-header">
                        <div class="ad-shop-info">
                            <div class="ad-domain">${ad.shop_domain || 'Unknown Domain'}</div>
                            <div class="ad-page-name">${ad.page_name || 'Ad'}</div>
                        </div>
                    </div>
                    <div class="ad-body">${ad.ad_creative_body || 'No description available'}</div>
                    <div class="ad-footer">
                        <div class="ad-actions">
                            ${ad.ad_snapshot_url ? `
                                <a href="${ad.ad_snapshot_url}" target="_blank" class="ad-link">View Screenshot</a>
                            ` : ''}
                        </div>
                        <button class="unsave-btn" onclick="unsaveAd(${ad.id})">Unsave</button>
                    </div>
                </div>
            `).join('');
        }

        async function loadSavedShops() {
            const container = document.getElementById('shops-container');
            container.innerHTML = '<div class="loading"><div class="spinner"></div>Loading saved shops...</div>';

            try {
                const response = await fetch(
                    `${SUPABASE_URL}/rest/v1/saved_shops?select=*`,
                    {
                        headers: {
                            'apikey': SUPABASE_ANON_KEY,
                            'Accept': 'application/json',
                        }
                    }
                );

                if (!response.ok) {
                    savedShops = [];
                    renderSavedShops();
                    return;
                }
                savedShops = await response.json();
                await enrichShopsData();
                renderSavedShops();
            } catch (error) {
                console.error('Error loading saved shops:', error);
                savedShops = [];
                renderSavedShops();
            }
        }

        async function enrichShopsData() {
            for (let shop of savedShops) {
                if (shop.shop_domain) {
                    try {
                        const response = await fetch(
                            `${SUPABASE_URL}/rest/v1/shops?domain=eq.${encodeURIComponent(shop.shop_domain)}&select=*`,
                            {
                                headers: {
                                    'apikey': SUPABASE_ANON_KEY,
                                    'Content-Type': 'application/json',
                                }
                            }
                        );

                        if (response.ok) {
                            const data = await response.json();
                            if (data.length > 0) {
                                shop.shopData = data[0];
                            }
                        }
                    } catch (error) {
                        console.error(`Error fetching shop data for ${shop.shop_domain}:`, error);
                    }
                }
            }
        }

        function renderSavedShops() {
            const container = document.getElementById('shops-container');

            if (savedShops.length === 0) {
                container.innerHTML = `
                    <div class="empty-state">
                        <div class="empty-icon">&#128717;&#65039;</div>
                        <div class="empty-title">No Saved Shops Yet</div>
                        <div class="empty-text">Start saving your favorite shops to track their performance.<br>Explore trending shops to find ones worth following.</div>
                        <div class="empty-cta">
                            <a href="peekr-dashboard.html" class="cta-btn cta-btn-primary">Explore Trending Shops</a>
                            <a href="peekr-trending-ads.html" class="cta-btn cta-btn-secondary">View Trending Ads</a>
                        </div>
                    </div>
                `;
                return;
            }

            container.innerHTML = `
                <table class="shops-table">
                    <thead>
                        <tr>
                            <th>Shop Name</th>
                            <th>Score</th>
                            <th>Country</th>
                            <th>Monthly Visits</th>
                            <th>Est. Revenue</th>
                            <th></th>
                        </tr>
                    </thead>
                    <tbody>
                        ${savedShops.map(shop => `
                            <tr>
                                <td>
                                    <div class="shop-name">${shop.shopData?.name || shop.shop_domain}</div>
                                    <div style="font-size: 12px; color: rgba(26, 10, 15, 0.5); margin-top: 4px;">${shop.shop_domain}</div>
                                </td>
                                <td>
                                    ${shop.shopData?.score ? `<div class="shop-score">${shop.shopData.score.toFixed(1)}</div>` : '<span style="color: rgba(26, 10, 15, 0.5);">-</span>'}
                                </td>
                                <td>${shop.shopData?.country || '-'}</td>
                                <td><div class="shop-visits">${shop.shopData?.monthly_visits ? shop.shopData.monthly_visits.toLocaleString() : '-'}</div></td>
                                <td><div class="shop-revenue">${shop.shopData?.estimated_revenue ? '$' + shop.shopData.estimated_revenue.toLocaleString() : '-'}</div></td>
                                <td class="shop-actions">
                                    <button class="unsave-btn" onclick="unsaveShop(${shop.id})">Unsave</button>
                                </td>
                            </tr>
                        `).join('')}
                    </tbody>
                </table>
            `;
        }

        async function unsaveAd(adId) {
            try {
                const response = await fetch(
                    `${SUPABASE_URL}/rest/v1/saved_ads?id=eq.${adId}`,
                    {
                        method: 'DELETE',
                        headers: {
                            'apikey': SUPABASE_ANON_KEY,
                            'Content-Type': 'application/json',
                        }
                    }
                );

                if (response.ok) {
                    savedAds = savedAds.filter(ad => ad.id !== adId);
                    renderSavedAds();
                } else {
                    alert('Failed to unsave ad');
                }
            } catch (error) {
                console.error('Error unsaving ad:', error);
                alert('Error unsaving ad');
            }
        }

        async function unsaveShop(shopId) {
            try {
                const response = await fetch(
                    `${SUPABASE_URL}/rest/v1/saved_shops?id=eq.${shopId}`,
                    {
                        method: 'DELETE',
                        headers: {
                            'apikey': SUPABASE_ANON_KEY,
                            'Content-Type': 'application/json',
                        }
                    }
                );

                if (response.ok) {
                    savedShops = savedShops.filter(shop => shop.id !== shopId);
                    renderSavedShops();
                } else {
                    alert('Failed to unsave shop');
                }
            } catch (error) {
                console.error('Error unsaving shop:', error);
                alert('Error unsaving shop');
            }
        }
    </script>
</body>
</html>
