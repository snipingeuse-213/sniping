*{box-sizing:border-box;margin:0;padding:0}
:root{--bg:#f0ece6;--dark:#1a0a0f;--pink:#e8799a;--pink-dark:#d4607a;--cream:#f0ece6;--card:rgba(255,255,255,0.85);--border:rgba(200,160,170,0.18);--text1:#1a0a0f;--text2:rgba(26,10,15,0.6);--text3:rgba(26,10,15,0.35);--green:#22c55e;--orange:#f6a05a;}
html,body{height:100%;overflow:hidden;}
body{font-family:'Figtree',sans-serif;background:var(--bg);color:var(--text1);display:flex;height:100vh;}

/* Sidebar */
.sb{width:220px;flex-shrink:0;background:var(--dark);display:flex;flex-direction:column;overflow-y:auto;overflow-x:hidden;z-index:20;}
.sb-logo{padding:16px 18px 14px;border-bottom:1px solid rgba(255,255,255,0.07);}
.ni{display:flex;align-items:center;gap:9px;padding:8px 16px;font-size:13px;font-weight:600;color:rgba(255,255,255,0.45);cursor:pointer;transition:all .15s;position:relative;white-space:nowrap;text-decoration:none;}
.ni:hover{color:rgba(255,255,255,0.9);background:rgba(255,255,255,0.06);}
.ni.active{color:#f4a7b9;background:rgba(232,121,154,0.15);font-weight:700;}
.ni.active::before{content:'';position:absolute;left:0;top:4px;bottom:4px;width:3px;background:var(--pink);border-radius:0 3px 3px 0;}
.ni-ico{width:26px;height:26px;border-radius:7px;background:rgba(255,255,255,0.07);border:1px solid rgba(255,255,255,0.1);display:flex;align-items:center;justify-content:center;flex-shrink:0;font-size:13px;}
.ni.active .ni-ico{background:rgba(232,121,154,0.2);border-color:rgba(232,121,154,0.35);}
.nb;margin-left:auto;background:var(--pink);color:#fff;font-size:10px;font-weight:800;padding:1px 7px;border-radius:20px;}
.nb.s{bbackground:rgba(255,255,255,0.08);color:rgba(255,255,255,0.3);}
.sb-lbl{font-size:10px;font-weight:800;letter-spacing:.1em;text-transform:uppercase;color:rgba(255,255,255,0.25);padding:0 16px 5px;}
.sb-sec{padding:10px 0 2px;}
.sb-bot{margin-top:auto;border-top:1px solid rgba(255,255,255,0.07);padding:12px;}
.uc{display:flex;align-items:center;gap:10px;padding:10px 12px;background:rgba(255,255,255,0.07);border:1px solid rgba(255,255,255,0.1);border-radius:12px;cursor:pointer;}

// --- Meta Ads ---
async function loadMetaAds(domainName){
  const container=document.getElementById('meta-ads');
  try{
    const adCount=parseInt(document.getElementById('ads-count')?.textContent)||0;

    if(adCount>0){
      container.innerHTML=generateAdPlaceholders(domainName, Math.min(adCount, 6));
    }else{
      container.innerHTML=`
        <div style="grid-column:1/-1;text-align:center;padding:40px 20px;">
          <div style="font-size:40px;margin-bottom:8px;">&#128226;</div>
          <div style="font-size:16px;font-weight:700;margin-bottom:6px;">No Active Ads Detected</div>
          <div style="color:var(--text2);font-size:13px;margin-bottom:16px;">This shop doesn't currently have active Meta ads, or we haven't indexed them yet.</div>
          <a class="shop-btn" href="https://www.facebook.com/ads/library/?active_status=all&ad_type=all&q=${encodeURIComponent(domainName)}" target="_blank" style="display:inline-flex;">
            &#128269; Check Meta Ad Library &#8599;
          </a>
        </div>`;
    }
  }catch(e){
    container.innerHTML='<div style="color:var(--text3);padding:20px;">Could not load ads data.</div>';
  }
}

function generateAdPlaceholders(domain, count){
  const n=Math.min(count, 6);
  let html='';
  for(let i=0;i<n;i++){
    html+=`
    <div class="ad-card">
      <div class="ad-card-media">
        <img src="https://image.thum.io/get/width/600/crop/600/https://${domain}"
             onerror="this.parentElement.innerHTML='<div style=\\'width:100%;height:100%;background:linear-gradient(135deg,rgba(232,121,154,0.1),rgba(232,121,154,0.03));display:flex;align-items:center;justify-content:center;font-size:24px;\\'>&#128226;</div>'" loading="lazy"/>
      </div>
      <div class="ad-card-body">
        <div class="ad-card-page">${domain}</div>
        <div class="ad-card-text" style="color:var(--text3);font-style:italic;">Ad creative #${i+1} — View on Meta Library for full details</div>
        <div class="ad-card-footer">
          <span class="ad-status active">&#128994; Active</span>
          <a class="ad-card-cta" href="https://www.facebook.com/ads/library/?active_status=active&ad_type=all&q=${encodeURIComponent(domain)}" target="_blank">View Ad &#8599;</a>
        </div>
      </div>
    </div>`;
  }
  return html;
}

function renderPixelCards(pixels, techs){
  const pixelIcons={
    'Google Analytics':'📊',
    'Google Tag Manager':'🏷️',
    'Meta Pixel':'Ⓜ️',
    'Facebook Pixel':'ⓕ',
    'Google Ads':'📢',
    'TikTok Pixel':'🎹',
    'Snap Pixel':'👻',
    'Pinterest Tag':'📌',
    'Microsoft Ads':'Ⓜ',
    'Criteo':'💰'
  };

  const pixelList=pixels.length>0?pixels:techs.filter(t=>/(pixel|analytics|tag|ads)/i.test(t)).slice(0,10);

  if(!pixelList.length) return '<div style="color:var(--text3);font-size:13px;">No pixels detected</div>';

  return '<div style="display:flex;flex-wrap:wrap;gap:12px;">'+pixelList.map(p=>{
    const icon=pixelIcons[p]||'📊';
    return `<div class="pixel-card"><div class="pixel-icon">${icon}</div><div class="pixel-name">${p}</div></div>`;
  }).join('')+'</div>';
}

function renderAppCards(apps){
  if(!apps.length) return '<div style="color:var(--text3);font-size:13px;">No apps detected</div>';

  return '<div class="tags">'+apps.map(a=>`<span class="tag app">${a.icon?`<img src="${a.icon}" style="width:14px;height:14px;border-radius:2px;" onerror="this.style.display='none'"/>`:''} ${a.name}</span>`).join('')+'</div>';
}

// --- Helpers ---
function fmtV(n){
  if(!n)return '0';
  if(n>=1e6)return(n/1e6).toFixed(1)+'M';
  if(n>=1e3)return(n/1e3).toFixed(n>=1e4?0:1)+'K';
  return n.toLocaleString();
}

function getAge(dateStr){
  const d=new Date(dateStr);
  const now=new Date();
  const months=Math.round((now-d)/(30.44*24*60*60*1000));
  if(months<1)return 'New';
  if(months<12)return months+'mo';
  const y=Math.floor(months/12);
  const m=months%12;
  return y+'y'+(m>0?' '+m+'mo':'');
}

// --- Ads History Chart (like TrendTrack "Ads actives dans le temps") ---
async function loadAdsChart(domain, range, btnEl) {
  if (btnEl) {
    document.querySelectorAll('#ads-chart-range .range-btn').forEach(b => b.classList.remove('active'));
    btnEl.classList.add('active');
  }

  const canvas = document.getElementById('ads-chart-canvas');
  const labelsEl = document.getElementById('ads-chart-labels');
  if (!canvas) return;

  try {
    const resp = await fetch(API_BASE+'?action=ads-history&domain='+encodeURIComponent(domain)+'&range='+range);
    const data = await resp.json();

    if (data.current_live_ads) {
      document.getElementById('ads-chart-current').textContent = data.current_live_ads.toLocaleString();
    }

    const history = data.history || [];
    if (history.length < 2) {
      const ctx = canvas.getContext('2d');
      ctx.clearRect(0, 0, canvas.width, canvas.height);
      canvas.parentElement.innerHTML = `
        `<div style="height:180px;display:flex;flex-direction:column;align-items:center;justify-content:center;color:var(--text3);">
          <div style="font-size:32px;margin-bottom:8px;">&#128202;</div>
          <div style="font-size:13px;font-weight:600;">Historical data building up</div>
          <div style="font-size:11px;margin-top:4px;">Chart will appear once we have multiple daily snapshots</div>
          </div>`;
      labelsEl.innerHTML = '';
      return;
    }

    drawAdsChart(canvas, history, labelsEl);
  } catch (e) {
    console.error('Ads chart error:', e);
  }
}

function drawAdsChart(canvas, history, labelsEl) {
  const dpr = window.devicePixelRatio || 1;
  const rect = canvas.parentElement.getBoundingClientRect();
  canvas.width = rect.width * dpr;
  canvas.height = rect.height * dpr;
  canvas.style.width = rect.width + 'px';
  canvas.style.height = rect.height + 'px';
  const ctx = canvas.getContext('2d');
  ctx.scale(dpr, dpr);
  ctx.clearRect(0, 0, rect.width, rect.height);

  const values = history.map(h => h.live_ads);
  const dates = history.map(h => h.recorded_at);
  const maxVal = Math.max(...values, 1);
  const minVal = Math.min(...values, 0);
  const range = maxVal - minVal || 1;
  const pad = { top: 20, right: 10, bottom: 5, left: 40 };
  const w = rect.width - pad.left - pad.right;
  const h = rect.height - pad.top - pad.bottom;

  // Y-axis labels
  ctx.fillStyle = '#b8a8b0';
  ctx.font = '10px Figtree, sans-serif';
  ctx.textAlign = 'right';
  for (let i = 0; i <= 4; i++) {
    const val = minVal + (range * (4 - i) / 4);
    const y = pad.top + (h * i / 4);
    ctx.fillText(fmtV(Math.round(val)), pad.left - 6, y + 3);
    ctx.strokeStyle = 'rgba(200,160,170,0.1)';
    ctx.lineWidth = 1;
    ctx.beginPath();
    ctx.moveTo(pad.left, y);
    ctx.lineTo(pad.left + w, y);
    ctx.stroke();
  }

  // Draw filled area + line
  const points = values.map((v, i) => ({
    x: pad.left + (i / (values.length - 1)) * w,
    y: pad.top + h - ((v - minVal) / range) * h
  }));

  // Filled area
  ctx.beginPath();
  ctx.moveTo(points[0].x, pad.top + h);
  points.forEach(p => ctx.lineTo(p.x, p.y));
  ctx.lineTo(points[points.length - 1].x, pad.top + h);
  ctx.closePath();
  const grad = ctx.createLinearGradient(0, pad.top, 0, pad.top + h);
  grad.addColorStop(0, 'rgba(232,121,154,0.25)');
  grad.addColorStop(1, 'rgba(232,121,154,0.02)');
  ctx.fillStyle = grad;
  ctx.fill();

  // Line
  ctx.beginPath();
  points.forEach((p, i) => i === 0 ? ctx.moveTo(p.x, p.y) : ctx.lineTo(p.x, p.y));
  ctx.strokeStyle = '#e8799a';
  ctx.lineWidth = 2;
  ctx.lineJoin = 'round';
  ctx.stroke();

  // Dots on last point
  const last = points[points.length - 1];
  ctx.beginPath();
  ctx.arc(last.x, last.y, 4, 0, Math.PI * 2);
  ctx.fillStyle = '#e8799a';
  ctx.fill();
  ctx.beginPath();
  ctx.arc(last.x, last.y, 6, 0, Math.PI * 2);
  ctx.strokeStyle = 'rgba(232,121,154,0.3)';
  ctx.lineWidth = 2;
  ctx.stroke();

  // X-axis labels (show ~6 dates evenly spaced)
  const labelCount = Math.min(dates.length, 6);
  const step = Math.max(1, Math.floor(dates.length / labelCount));
  let labelsHtml = '';
  for (let i = 0; i < dates.length; i += step) {
    const d = new Date(dates[i]);
    const label = d.toLocaleDateString('en', { month: 'short', day: 'numeric' });
    labelsHtml += `<span>${label}</span>`;
  }
  labelsEl.innerHTML = labelsHtml;
}

// Auto-load ads chart on page load
function initAdsChart(domain) {
  setTimeout(() => loadAdsChart(domain, '6m', null), 500);
}

async function saveShop(domain){
  try{
    const res=await fetch(_SB+'/rest/v1/saved_shops',{
      method:'POST',
      headers:{'apikey':_AK,'Content-Type':'application/json','Prefer':'return=minimal'},
      body:JSON.stringify({user_id:'00000000-0000-0000-0000-000000000000',shop_domain:domain})
    });
    if(res.ok||res.status===201)alert('Shop saved!');
    else if(res.status===409)alert('Already saved!');
    else alert('Could not save.');
  }catch(e){alert('Error saving shop.');}
}
