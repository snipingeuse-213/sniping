<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8"/>
<meta name="viewport" content="width=device-width, initial-scale=1.0"/>
<title>Shop Analytics - Peekr</title>
<link rel="icon" href="data:image/svg+xml,<svg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 100 100'><text y='.9em' font-size='90'>&#128065;&#65039;</text></svg>"/>
<link href="https://fonts.googleapis.com/css2?family=Figtree:wght@400;500;600;700;800;900&display=swap" rel="stylesheet"/>
<link href="https://api.fontshare.com/v2/css?f[]=clash-display@600,700&display=swap" rel="stylesheet"/>
<style>
*{box-sizing:border-box;margin:0;padding:0}
:root{--bg:#f0ece6;--dark:#1a0a0f;--pink:#e8799a;--pink-dark:#d4607a;--cream:#f0ece6;--card:rgba(255,255,255,0.85);--border:rgba(200,160,170,0.18);--text1:#1a0a0f;--text2:rgba(26,10,15,0.6);--text3:rgba(26,10,15,0.35);--green:#22c55e;--orange:#f6a05a;--neon:#ff2d78;--neon-soft:#ff5c9a;--neon-glow:rgba(255,45,120,0.35);--neon-glow2:rgba(255,45,120,0.15);--neon-glow3:rgba(255,45,120,0.08);}
html,body{height:100%;overflow:hidden;}
body{font-family:'Figtree',sans-serif;background:var(--bg);color:var(--text1);display:flex;height:100vh;}

/* Sidebar */
.sb{width:220px;background:#0a0a0f;display:flex;flex-direction:column;overflow-y:auto;overflow-x:hidden;position:fixed;left:0;top:0;height:100vh;z-index:20;border-right:1px solid rgba(255,45,120,0.08);}
.sb::-webkit-scrollbar{width:3px;}
.sb::-webkit-scrollbar-thumb{background:rgba(255,45,120,0.2);border-radius:3px;}
.sb-logo{padding:16px 18px 14px;border-bottom:1px solid rgba(255,45,120,0.1);position:relative;}
.sb-logo::after{content:'';position:absolute;bottom:-1px;left:16px;right:16px;height:1px;background:linear-gradient(90deg,transparent,rgba(255,45,120,0.35),transparent);}
.sb-sec{padding:10px 0 2px;}
.sb-lbl{font-size:10px;font-weight:800;letter-spacing:.1em;text-transform:uppercase;color:rgba(255,255,255,0.25);padding:0 16px 5px;}
.ni{display:flex;align-items:center;gap:9px;padding:8px 16px;font-size:13px;font-weight:600;color:rgba(255,255,255,0.45);cursor:pointer;transition:all .15s;position:relative;white-space:nowrap;text-decoration:none;}
.ni:hover{color:rgba(255,255,255,0.9);background:rgba(255,255,255,0.06);}
.ni:hover .ni-ico{background:rgba(255,255,255,0.08);border-color:rgba(255,255,255,0.15);}
.ni.active{color:var(--neon-soft,#ff5c9a);background:rgba(255,45,120,0.12);font-weight:700;}
.ni.active::before{content:'';position:absolute;left:0;top:4px;bottom:4px;width:3px;background:var(--neon,#ff2d78);border-radius:0 3px 3px 0;box-shadow:0 0 8px rgba(255,45,120,0.35);}
.ni-ico{width:26px;height:26px;border-radius:7px;background:rgba(255,255,255,0.05);border:1px solid rgba(255,255,255,0.08);display:flex;align-items:center;justify-content:center;flex-shrink:0;font-size:13px;transition:all .15s;}
.ni.active .ni-ico{background:rgba(255,45,120,0.15);border-color:rgba(255,45,120,0.3);box-shadow:0 0 8px rgba(255,45,120,0.15);}
.nb{margin-left:auto;background:var(--neon,#ff2d78);color:#fff;font-size:10px;font-weight:800;padding:1px 7px;border-radius:20px;box-shadow:0 0 10px rgba(255,45,120,0.35);}
.nb.s{background:rgba(255,255,255,0.08);color:rgba(255,255,255,0.3);box-shadow:none;}
.sb-bot{margin-top:auto;border-top:1px solid rgba(255,45,120,0.08);padding:12px;}
.uc{display:flex;align-items:center;gap:10px;padding:10px 12px;background:rgba(255,255,255,0.05);border:1px solid rgba(255,45,120,0.1);border-radius:12px;cursor:pointer;transition:all .15s;}
.uc:hover{background:rgba(255,45,120,0.08);border-color:rgba(255,45,120,0.2);}
.ua{width:30px;height:30px;border-radius:50%;background:linear-gradient(135deg,var(--neon,#ff2d78),var(--neon-soft,#ff5c9a));display:flex;align-items:center;justify-content:center;font-size:12px;font-weight:800;color:#fff;flex-shrink:0;box-shadow:0 0 12px rgba(255,45,120,0.35);}
.un{font-size:12px;font-weight:700;color:rgba(255,255,255,0.85);}
.up{font-size:10px;color:var(--neon-soft,#ff5c9a);font-weight:700;}

/* Main */
.main{flex:1;display:flex;flex-direction:column;overflow:hidden;min-width:0;background:#fff;margin-left:220px;}

/* Topbar */
.topbar{height:56px;flex-shrink:0;display:flex;align-items:center;gap:12px;padding:0 24px;background:#fff;border-bottom:1px solid var(--border);}
.back-btn{display:flex;align-items:center;gap:6px;padding:6px 14px;border-radius:8px;font-size:13px;font-weight:600;color:var(--text2);cursor:pointer;border:1px solid var(--border);background:var(--card);transition:all .15s;text-decoration:none;}
.back-btn:hover{border-color:var(--pink);color:var(--pink);}
.tb-title{font-family:'Clash Display',sans-serif;font-size:17px;font-weight:700;letter-spacing:-.02em;}
.tb-domain{font-size:13px;color:var(--pink);font-weight:600;margin-left:4px;}

/* Content */
.content{flex:1;overflow-y:auto;padding:24px;background:var(--bg);}

/* Shop Header */
.shop-header{display:flex;align-items:flex-start;gap:20px;margin-bottom:0;background:var(--card);backdrop-filter:blur(12px);border:1px solid var(--border);border-radius:16px 16px 0 0;padding:24px;}
.shop-icon{width:64px;height:64px;border-radius:14px;overflow:hidden;flex-shrink:0;background:#f5f0eb;border:2px solid var(--border);display:flex;align-items:center;justify-content:center;}
.shop-icon img{width:100%;height:100%;object-fit:cover;}
.shop-icon-fb{font-size:22px;font-weight:800;color:var(--pink);background:linear-gradient(135deg,rgba(232,121,154,0.1),rgba(232,121,154,0.04));width:100%;height:100%;display:flex;align-items:center;justify-content:center;}
.shop-info{flex:1;min-width:0;}
.shop-name{font-family:'Clash Display',sans-serif;font-size:24px;font-weight:700;display:flex;align-items:center;gap:10px;}
.shopify-badge{display:inline-flex;align-items:center;gap:3px;background:#95BF47;color:#fff;font-size:10px;font-weight:700;padding:2px 8px;border-radius:10px;}
.shop-domains{display:flex;align-items:center;gap:12px;margin-top:4px;}
.shop-domain{color:var(--pink);font-size:13px;font-weight:600;text-decoration:none;display:flex;align-items:center;gap:4px;}
.shop-domain:hover{text-decoration:underline;}
.shop-meta{display:flex;align-items:center;gap:10px;margin-top:10px;flex-wrap:wrap;}
.meta-chip{font-size:11px;font-weight:600;padding:3px 10px;border-radius:20px;display:flex;align-items:center;gap:5px;background:rgba(26,10,15,0.04);border:1px solid var(--border);color:var(--text2);}
.meta-chip img{width:16px;height:12px;border-radius:2px;}
.shop-actions{display:flex;gap:8px;flex-shrink:0;}
.shop-btn{padding:8px 16px;border-radius:8px;font-size:12px;font-weight:700;cursor:pointer;border:1px solid var(--border);background:#fff;color:var(--text1);transition:all .15s;text-decoration:none;display:inline-flex;align-items:center;gap:6px;white-space:nowrap;}
.shop-btn:hover{border-color:var(--pink);color:var(--pink);}
.shop-btn.primary{background:var(--pink);color:#fff;border-color:var(--pink);}
.shop-btn.primary:hover{background:var(--pink-dark);}
.score-badge{width:68px;height:68px;border-radius:50%;display:flex;flex-direction:column;align-items:center;justify-content:center;flex-shrink:0;font-size:22px;font-weight:800;border:3px solid;}
.score-label{font-size:8px;font-weight:700;text-transform:uppercase;letter-spacing:.05em;opacity:.7;}

/* Tabs */
.tabs-bar{display:flex;background:var(--card);border:1px solid var(--border);border-top:none;border-radius:0 0 16px 16px;padding:0 24px;margin-bottom:20px;gap:0;}
.tab{padding:12px 20px;font-size:13px;font-weight:700;color:var(--text3);cursor:pointer;border-bottom:2px solid transparent;transition:all .15s;display:flex;align-items:center;gap:6px;}
.tab:hover{color:var(--text1);}
.tab.active{color:var(--pink);border-bottom-color:var(--pink);}
.tab .count{background:var(--pink);color:#fff;font-size:10px;font-weight:800;padding:1px 7px;border-radius:20px;}
.tab-panel{display:none;}
.tab-panel.active{display:block;}

/* KPI Grid */
.kpi-grid{display:grid;grid-template-columns:repeat(auto-fit,minmax(155px,1fr));gap:12px;margin-bottom:20px;}
.kpi{background:var(--card);backdrop-filter:blur(12px);border:1px solid var(--border);border-radius:12px;padding:16px;}
.kpi-label{font-size:10px;font-weight:700;color:var(--text3);text-transform:uppercase;letter-spacing:.04em;margin-bottom:6px;}
.kpi-value{font-size:22px;font-weight:800;color:var(--text1);display:flex;align-items:center;gap:8px;}
.kpi-growth{font-size:12px;font-weight:700;padding:2px 8px;border-radius:10px;}
.kpi-growth.up{background:rgba(34,197,94,0.1);color:var(--green);}
.kpi-growth.down{background:rgba(239,68,68,0.1);color:#ef4444;}
.kpi-sub{font-size:11px;color:var(--text2);margin-top:2px;}

/* Sections */
.section{background:var(--card);backdrop-filter:blur(12px);border:1px solid var(--border);border-radius:14px;padding:20px;margin-bottom:16px;}
.section-title{font-family:'Clash Display',sans-serif;font-size:15px;font-weight:700;margin-bottom:14px;display:flex;align-items:center;gap:8px;}
.section-title .ico{font-size:16px;}
.section-title .see-more{margin-left:auto;font-family:'Figtree',sans-serif;font-size:12px;font-weight:600;color:var(--pink);cursor:pointer;text-decoration:none;}

/* Chart */
.chart-container{height:200px;display:flex;align-items:flex-end;gap:4px;padding-top:10px;position:relative;}
.chart-bar{flex:1;border-radius:4px 4px 0 0;transition:all .3s;min-width:8px;position:relative;cursor:default;}
.chart-bar:hover{opacity:0.8;}
.chart-bar .tooltip{display:none;position:absolute;bottom:100%;left:50%;transform:translateX(-50%);background:var(--dark);color:#fff;font-size:10px;padding:4px 8px;border-radius:6px;white-space:nowrap;margin-bottom:4px;z-index:5;}
.chart-bar:hover .tooltip{display:block;}
.chart-labels{display:flex;gap:4px;margin-top:6px;}
.chart-labels span{flex:1;text-align:center;font-size:9px;color:var(--text3);font-weight:600;}

/* Range Buttons (TrendTrack-style) */
.range-btn{font-size:11px;font-weight:700;padding:3px 10px;border-radius:8px;border:1px solid var(--border);background:transparent;color:var(--text3);cursor:pointer;transition:all .15s;font-family:'Figtree',sans-serif;}
.range-btn:hover{border-color:var(--pink);color:var(--pink);}
.range-btn.active{background:var(--pink);color:#fff;border-color:var(--pink);}

/* Tags */
.tags{display:flex;flex-wrap:wrap;gap:6px;}
.tag{font-size:11px;font-weight:700;padding:4px 10px;border-radius:8px;border:1px solid;display:inline-flex;align-items:center;gap:5px;}
.tag.pixel{background:rgba(232,121,154,0.07);color:var(--pink-dark);border-color:rgba(232,121,154,0.2);}
.tag.app{background:rgba(144,120,200,0.08);color:#7c5cbf;border-color:rgba(144,120,200,0.2);}
.tag.niche{background:rgba(232,121,154,0.08);color:var(--pink);border-color:rgba(232,121,154,0.2);}
.tag.strat{background:rgba(82,200,122,0.08);color:#2a9e54;border-color:rgba(82,200,122,0.2);}
.tag.ship{background:rgba(100,140,200,0.08);color:#4a7ec0;border-color:rgba(100,140,200,0.2);}

/* Details Grid */
.details-grid{display:grid;grid-template-columns:repeat(auto-fill,minmax(200px,1fr));gap:10px;}
.detail-item{display:flex;justify-content:space-between;align-items:center;padding:10px 12px;background:rgba(240,236,230,0.5);border-radius:8px;}
.detail-item .label{font-size:12px;color:var(--text2);}
.detail-item .value{font-size:13px;font-weight:700;}

/* Two Column */
.two-col{display:grid;grid-template-columns:1fr 1fr;gap:16px;}
@media(max-width:900px){.two-col{grid-template-columns:1fr;}}

/* Info Row (Trustpilot/Countries/Social) */
.info-row{display:grid;grid-template-columns:repeat(3,1fr);gap:16px;margin-bottom:16px;}
@media(max-width:900px){.info-row{grid-template-columns:1fr;}}

.info-card{background:var(--card);backdrop-filter:blur(12px);border:1px solid var(--border);border-radius:12px;padding:16px;}
.info-card-title{font-size:12px;font-weight:700;color:var(--text3);text-transform:uppercase;letter-spacing:.04em;margin-bottom:10px;}
.trustpilot-rating{display:flex;align-items:center;gap:10px;margin-bottom:8px;}
.trustpilot-stars{font-size:20px;letter-spacing:2px;}
.trustpilot-score{font-size:18px;font-weight:800;color:var(--text1);}
.trustpilot-reviews{font-size:11px;color:var(--text2);margin-top:4px;}

.countries-list{display:flex;flex-direction:column;gap:8px;}
.country-item{display:flex;align-items:center;justify-content:space-between;padding:8px 0;border-bottom:1px solid rgba(200,160,170,0.1);}
.country-item:last-child{border-bottom:none;}
.country-flag{font-size:16px;margin-right:6px;}
.country-name{font-size:12px;color:var(--text1);flex:1;}
.country-pct{font-size:11px;font-weight:700;color:var(--pink);}

.social-list{display:flex;flex-direction:column;gap:10px;}
.social-item{display:flex;align-items:center;gap:10px;padding:8px 0;}
.social-icon{font-size:18px;width:30px;text-align:center;}
.social-platform{font-size:12px;color:var(--text1);font-weight:600;flex:1;}
.social-followers{font-size:11px;font-weight:700;color:var(--text3);}

/* Products Carousel */
.products-carousel{display:flex;gap:12px;overflow-x:auto;padding:8px 0;scroll-behavior:smooth;}
.products-carousel::-webkit-scrollbar{height:4px;}
.products-carousel::-webkit-scrollbar-thumb{background:rgba(232,121,154,0.2);border-radius:2px;}

.product-card{background:var(--card);border:1px solid var(--border);border-radius:10px;padding:12px;flex-shrink:0;width:140px;cursor:pointer;transition:all .15s;}
.product-card:hover{border-color:var(--pink);transform:translateY(-2px);}
.product-image{width:100%;aspect-ratio:1/1;background:#f5f0eb;border-radius:8px;overflow:hidden;margin-bottom:8px;}
.product-image img{width:100%;height:100%;object-fit:cover;}
.product-title{font-size:11px;font-weight:700;color:var(--text1);margin-bottom:4px;display:-webkit-box;-webkit-line-clamp:2;-webkit-box-orient:vertical;overflow:hidden;line-height:1.3;}
.product-price{font-size:12px;font-weight:800;color:var(--pink);margin-bottom:2px;}
.product-date{font-size:9px;color:var(--text3);}

/* Pixel & Tech Cards */
.pixel-card{background:var(--card);border:1px solid var(--border);border-radius:10px;padding:12px;flex-shrink:0;width:100px;text-align:center;cursor:pointer;transition:all .15s;display:inline-flex;flex-direction:column;align-items:center;justify-content:center;}
.pixel-card:hover{border-color:var(--pink);transform:translateY(-2px);}
.pixel-icon{font-size:24px;margin-bottom:6px;}
.pixel-name{font-size:10px;font-weight:700;color:var(--text1);text-align:center;line-height:1.2;}

/* Ads Scroll */
.ads-scroll{display:flex;gap:16px;overflow-x:auto;padding:8px 0;scroll-behavior:smooth;}
.ads-scroll::-webkit-scrollbar{height:4px;}
.ads-scroll::-webkit-scrollbar-thumb{background:rgba(232,121,154,0.2);border-radius:2px;}

.latest-ad-card{background:var(--card);border:1px solid var(--border);border-radius:12px;overflow:hidden;flex-shrink:0;width:280px;transition:all .15s;cursor:pointer;}
.latest-ad-card:hover{border-color:var(--pink);box-shadow:0 4px 12px rgba(232,121,154,0.1);}
.latest-ad-image{width:100%;aspect-ratio:16/9;background:#f5f0eb;overflow:hidden;position:relative;}
.latest-ad-image img{width:100%;height:100%;object-fit:cover;}
.latest-ad-body{padding:12px;}
.latest-ad-page{font-size:10px;color:var(--text3);font-weight:600;margin-bottom:4px;}
.latest-ad-text{font-size:11px;color:var(--text1);line-height:1.4;margin-bottom:8px;display:-webkit-box;-webkit-line-clamp:2;-webkit-box-orient:vertical;overflow:hidden;}
.latest-ad-footer{display:flex;align-items:center;justify-content:space-between;font-size:10px;color:var(--text3);}
.latest-ad-cta{padding:4px 8px;border-radius:6px;background:var(--pink);color:#fff;font-size:10px;font-weight:700;text-decoration:none;}

/* Media Mix Bar */
.media-mix-row{display:flex;gap:12px;align-items:center;margin-bottom:12px;}
.media-mix-label{font-size:11px;font-weight:600;color:var(--text2);min-width:70px;}
.media-mix-bars{display:flex;gap:2px;flex:1;height:20px;border-radius:4px;overflow:hidden;background:rgba(26,10,15,0.05);}
.media-mix-bar{height:100%;display:flex;align-items:center;justify-content:center;font-size:8px;font-weight:700;color:#fff;}
.media-mix-bar.video{background:var(--pink);}
.media-mix-bar.image{background:#f6a05a;}
.media-mix-bar.dco{background:#8b5cf6;}

/* Landing Pages */
.landing-page-item{display:flex;align-items:center;justify-content:space-between;padding:10px 12px;background:rgba(240,236,230,0.5);border-radius:8px;margin-bottom:8px;}
.landing-page-url{font-size:11px;font-weight:600;color:var(--text1);flex:1;word-break:break-all;font-family:monospace;}
.landing-page-count{font-size:11px;font-weight:800;color:var(--pink);}

/* Similar Shop Card */
.sim-grid{display:grid;grid-template-columns:repeat(auto-fill,minmax(260px,1fr));gap:12px;}
.sim-card{background:var(--card);border:1px solid var(--border);border-radius:12px;padding:16px;cursor:pointer;transition:all .15s;text-decoration:none;color:inherit;}
.sim-card:hover{border-color:var(--pink);transform:translateY(-2px);box-shadow:0 4px 12px rgba(232,121,154,0.1);}
.sim-card-head{display:flex;align-items:center;gap:10px;margin-bottom:10px;}
.sim-card-icon{width:36px;height:36px;border-radius:8px;overflow:hidden;flex-shrink:0;background:#f5f0eb;border:1px solid var(--border);}
.sim-card-icon img{width:100%;height:100%;object-fit:cover;}
.sim-card-name{font-size:14px;font-weight:700;}
.sim-card-domain{font-size:11px;color:var(--text3);}
.sim-card-stats{display:flex;gap:12px;font-size:11px;color:var(--text2);font-weight:600;}
.sim-card-stats span{display:flex;align-items:center;gap:3px;}
.sim-card-flag{width:16px;height:12px;border-radius:2px;vertical-align:middle;}

/* Ad Cards */
.ads-grid{display:grid;grid-template-columns:repeat(auto-fill,minmax(300px,1fr));gap:16px;}
.ad-card{background:var(--card);border:1px solid var(--border);border-radius:12px;overflow:hidden;transition:all .15s;}
.ad-card:hover{border-color:var(--pink);box-shadow:0 4px 12px rgba(232,121,154,0.08);}
.ad-card-media{width:100%;aspect-ratio:1/1;background:#f5f0eb;overflow:hidden;position:relative;}
.ad-card-media img{width:100%;height:100%;object-fit:cover;}
.ad-card-media .play-overlay{position:absolute;inset:0;display:flex;align-items:center;justify-content:center;background:rgba(0,0,0,0.2);}
.ad-card-media .play-btn{width:48px;height:48px;border-radius:50%;background:rgba(255,255,255,0.9);display:flex;align-items:center;justify-content:center;font-size:20px;}
.ad-card-body{padding:14px;}
.ad-card-page{font-size:11px;color:var(--text3);font-weight:600;margin-bottom:4px;}
.ad-card-text{font-size:12px;color:var(--text1);line-height:1.5;margin-bottom:8px;display:-webkit-box;-webkit-line-clamp:3;-webkit-box-orient:vertical;overflow:hidden;}
.ad-card-footer{display:flex;align-items:center;gap:8px;font-size:11px;color:var(--text3);}
.ad-card-cta{margin-left:auto;padding:4px 10px;border-radius:6px;background:var(--pink);color:#fff;font-size:11px;font-weight:700;text-decoration:none;}
.ad-status{display:inline-flex;align-items:center;gap:4px;font-size:10px;font-weight:700;padding:2px 8px;border-radius:10px;}
.ad-status.active{background:rgba(34,197,94,0.1);color:var(--green);}
.ad-status.inactive{background:rgba(180,170,165,0.15);color:#999;}

/* Loading */
.loading{display:flex;flex-direction:column;align-items:center;justify-content:center;height:300px;gap:12px;color:var(--text3);}
.spinner{width:40px;height:40px;border:3px solid var(--border);border-top-color:var(--pink);border-radius:50%;animation:spin 1s linear infinite;}
@keyframes spin{to{transform:rotate(360deg)}}

/* Flag */
.flag-img{width:20px;height:14px;border-radius:2px;object-fit:cover;vertical-align:middle;}

/* Scrollbar */
::-webkit-scrollbar{width:4px;height:4px}
::-webkit-scrollbar-thumb{background:rgba(232,121,154,0.2);border-radius:4px}

/* Tabs within sections */
.section-tabs{display:flex;gap:8px;margin-bottom:12px;border-bottom:1px solid var(--border);padding-bottom:8px;}
.section-tab{padding:6px 12px;font-size:11px;font-weight:700;color:var(--text3);cursor:pointer;border-bottom:2px solid transparent;transition:all .15s;}
.section-tab:hover{color:var(--text1);}
.section-tab.active{color:var(--pink);border-bottom-color:var(--pink);}
</style>
</head>
<body>

<!-- SIDEBAR NEON ROSE -->
<aside class="sb">

<script>
const _SB='https://vsyceexjsitliwaasdhd.supabase.co';
const _AK='eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6InZzeWNlZXhqc2l0bGl3YWFzZGhkIiwicm9sZSI6ImFub24iLCJpYXQiOjE3NzQ0NDgzNzYsImV4cCI6MjA5MDAyNDM3Nn0.nng6CrCZIYiW3i-b3z5hm6AXhepA8t1CUhZ1Kt4aZwo';
const API_BASE='https://sniping-three.vercel.app/api/backfill-ads';

const params=new URLSearchParams(window.location.search);
const domain=params.get('domain');

if(!domain){
  document.getElementById('content').innerHTML='<div class="loading"><div style="font-size:48px;">&#128269;</div><div style="font-size:16px;font-weight:700;">No shop selected</div><a href="peekr-dashboard.html" style="color:var(--pink);font-weight:600;">Go to Dashboard</a></div>';
}else{
  document.getElementById('page-domain').textContent=domain;
  loadShop(domain);
}

async function sbFetch(url){
  return fetch(url,{headers:{'apikey':_AK,'Accept':'application/json'}}).then(r=>r.json());
}

async function loadShop(d){
  try{
    const data=await sbFetch(_SB+'/rest/v1/shops?domain=eq.'+encodeURIComponent(d)+'&select=*');
    if(!data||data.length===0){
      document.getElementById('content').innerHTML='<div class="loading"><div style="font-size:48px;">&#128533;</div><div style="font-size:16px;font-weight:700;">Shop not found</div><div style="color:var(--text2);">'+d+' is not in our database yet.</div><a href="peekr-dashboard.html" style="color:var(--pink);font-weight:600;">Go to Dashboard</a></div>';
      return;
    }
    renderShop(data[0]);
  }catch(e){
    document.getElementById('content').innerHTML='<div class="loading"><div style="font-size:48px;">&#9888;&#65039;</div><div>Error: '+e.message+'</div></div>';
  }
}

function renderShop(s){
  document.title=(s.title||s.name||s.domain)+' - Peekr Analytics';
  document.getElementById('page-title').textContent=s.title||s.name||s.domain;

  const score=s.score||0;
  const tier=score>=80?'hot':score>=60?'rising':score>=40?'watch':'cold';
  const TC={hot:'#e8799a',rising:'#f6a05a',watch:'#e6b83a',cold:'#b8a8b0'};
  const TL={hot:'Hot',rising:'Rising',watch:'Watch',cold:'Cold'};
  const c=TC[tier];

  const visits=s.monthly_visits||0;
  const ads=s.live_ads||0;
  const products=s.products_count||0;
  const estSales=s.estimated_sales||0;
  const estSalesY=s.estimated_sales_yearly||0;
  const aov=s.avg_price_usd?s.avg_price_usd:0;
  const country=s.country||'';
  const created=(s.created_date||'').replace('T00:00:00','');
  const age=created?getAge(created):'N/A';
  const niche=s.niche||s.categories&&s.categories[0]||'General';
  const lang=s.language||'N/A';
  const currency=s.currency||'N/A';
  const plan=s.shopify_plan||'N/A';
  const theme=s.theme||'Unknown';
  // Parse technologies - they may be JSON strings from Store Leads API
  const rawTechs=s.technologies||[];
  const parsedTechs=rawTechs.map(t=>{if(typeof t==='object')return t;if(typeof t==='string'){try{return JSON.parse(t);}catch(e){return{name:t};}}return{name:String(t)};});
  const techNames=parsedTechs.map(t=>t.name||'');
  const pixels=s.ad_platforms&&s.ad_platforms.length?s.ad_platforms:parsedTechs;
  const techs=techNames;
  const rawApps=s.apps||[];
  const apps=rawApps.map(a=>{if(typeof a==='object')return{name:a.name||'Unknown',icon:a.icon_url||''};if(typeof a==='string'){try{const p=JSON.parse(a);return{name:p.name||'Unknown',icon:p.icon_url||''};}catch(e){return{name:a,icon:''};}}return{name:String(a),icon:''};});
  const strats=s.strategies||[];
  const shipsTo=s.ships_to||[];
  const rawTraffic=s.traffic_trend||[];
  const traffic=rawTraffic.map(v=>typeof v==='object'?(v.visits||v.value||0):Number(v)||0);
  const icon=s.icon||'';
  const description=s.description||'';
  const merchantName=s.merchant_name||'';
  const myshopify=s.domain?.includes('.myshopify.')?s.domain:s.domain?.replace(/\.[^.]+$/,'')+'.myshopify.com';

  // Parse visitor countries
  let visitorCountries=[];
  if(s.visitor_countries){
    if(typeof s.visitor_countries==='string'){
      try{visitorCountries=JSON.parse(s.visitor_countries);}catch(e){visitorCountries=[];}
    }else if(Array.isArray(s.visitor_countries)){
      visitorCountries=s.visitor_countries;
    }
  }

  // Parse social links
  let socialLinks={};
  if(s.social_links){
    if(typeof s.social_links==='string'){
      try{socialLinks=JSON.parse(s.social_links);}catch(e){socialLinks={};}
    }else if(typeof s.social_links==='object'){
      socialLinks=s.social_links;
    }
  }

  // Parse top products
  let topProducts=[];
  if(s.top_products){
    if(typeof s.top_products==='string'){
      try{topProducts=JSON.parse(s.top_products);}catch(e){topProducts=[];}
    }else if(Array.isArray(s.top_products)){
      topProducts=s.top_products;
    }
  }

  const init=(n)=>{const p=(n||'').split(/[\s.-]+/);return(p[0]?p[0][0]:'')+(p[1]?p[1][0]:'');};
  const mx=Math.max(...traffic,1);

  const ct=document.getElementById('content');
  ct.innerHTML=`
    <!-- Shop Header -->
    <div class="shop-header">
      <div class="shop-icon">
        ${icon?`<img src="${icon}" onerror="this.style.display='none';this.nextElementSibling.style.display='flex';" /><div class="shop-icon-fb" style="display:none;">${init(s.name||s.domain)}</div>`:
        `<div class="shop-icon-fb">${init(s.name||s.domain)}</div>`}
      </div>
      <div class="shop-info">
        <div class="shop-name">
          ${s.title||s.name||s.domain}
          <span class="shopify-badge">&#128994; Shopify</span>
        </div>
        <div class="shop-domains">
          <a class="shop-domain" href="https://${s.domain}" target="_blank">${s.domain} &#8599;</a>
          <span style="color:var(--text3);font-size:11px;">|</span>
          <span style="font-size:11px;color:var(--text3);font-family:monospace;">${myshopify}</span>
        </div>
        <div class="shop-meta">
          ${country?`<span class="meta-chip"><img src="https://flagcdn.com/w40/${country.toLowerCase()}.png"/> ${country.toUpperCase()}</span>`:''}
          <span class="meta-chip">&#128197; ${created||'N/A'} ${age!=='N/A'?'('+age+')':''}</span>
          <span class="meta-chip">&#127760; ${lang}</span>
          <span class="meta-chip">&#128176; ${currency}</span>
          <span class="meta-chip tag niche" style="margin:0;">${niche}</span>
          <span class="meta-chip">&#127991; ${plan}</span>
        </div>
      </div>
      <div style="display:flex;flex-direction:column;align-items:center;gap:8px;flex-shrink:0;">
        <div class="score-badge" style="color:${c};border-color:${c};">
          ${score}
          <div class="score-label">${TL[tier]}</div>
        </div>
        <div style="display:flex;gap:6px;">
          <button class="shop-btn" onclick="saveShop('${s.domain}')" title="Save Shop">&#128190;</button>
          <a class="shop-btn" href="https://${s.domain}" target="_blank" title="Visit Store">&#127760;</a>
        </div>
      </div>
    </div>

    <!-- Tabs -->
    <div class="tabs-bar">
      <div class="tab active" onclick="switchTab('analytics',this)">&#128202; Shop Analytics</div>
      <div class="tab" onclick="switchTab('similar',this)">&#127978; Similar Shops</div>
      <div class="tab" onclick="switchTab('ads',this)">&#128227; Meta Ads <span class="count" id="ads-count">${ads||'?'}</span></div>
      <div class="tab" onclick="switchTab('emails',this)" style="opacity:0.4;cursor:default;">&#128231; Emails <span class="nb s">Soon</span></div>
    </div>

    <!-- Panel: Analytics -->
    <div class="tab-panel active" id="panel-analytics">
      ${description?`<div class="section" style="margin-bottom:16px;"><p style="font-size:13px;color:var(--text2);line-height:1.6;">${description}</p></div>`:''}

      <!-- KPIs -->
      <div class="kpi-grid">
        <div class="kpi">
          <div class="kpi-label">&#128200; Monthly Traffic</div>
          <div class="kpi-value">${fmtV(visits)}</div>
          <div class="kpi-sub">Estimated monthly visits</div>
        </div>
        <div class="kpi">
          <div class="kpi-label">&#128722; Products</div>
          <div class="kpi-value">${products.toLocaleString()}</div>
          <div class="kpi-sub">Products in catalog</div>
        </div>
        <div class="kpi">
          <div class="kpi-label">&#128226; Live Ads</div>
          <div class="kpi-value" style="color:${ads>20?'var(--pink)':'inherit'}">${ads}</div>
          <div class="kpi-sub">Active Meta ads</div>
        </div>
        <div class="kpi">
          <div class="kpi-label">&#128184; Est. Sales / mo</div>
          <div class="kpi-value">${estSales?'$'+fmtV(estSales):'N/A'}</div>
          <div class="kpi-sub">${estSalesY?'~$'+fmtV(estSalesY)+'/year':'—'}</div>
        </div>
        <div class="kpi">
          <div class="kpi-label">&#128181; Avg. Order Value</div>
          <div class="kpi-value">${aov?'$'+(aov/100).toFixed(2):'N/A'}</div>
        </div>
        <div class="kpi">
          <div class="kpi-label">&#127919; Score</div>
          <div class="kpi-value" style="color:${c};">${score}<span style="font-size:13px;color:var(--text3);">/100</span></div>
          <div class="kpi-sub">${TL[tier]} store</div>
        </div>
      </div>

      <!-- Info Row: Trustpilot, Countries, Social -->
      <div class="info-row" id="info-row-container">
        <!-- Will be filled by loadInfoRow -->
      </div>

      <div class="two-col">
        <div>
          <!-- Traffic Chart -->
          <div class="section">
            <div class="section-title"><span class="ico">&#128200;</span> Traffic Trend (12 weeks)</div>
            <div class="chart-container">
              ${traffic.length>0?traffic.map((v,i)=>`<div class="chart-bar" style="height:${Math.max((v/mx)*180,6)}px;background:linear-gradient(180deg,${c},${c}88);opacity:${0.3+(i/traffic.length)*0.7};"><div class="tooltip">${fmtV(v)} visits</div></div>`).join(''):'<div style="flex:1;display:flex;align-items:center;justify-content:center;color:var(--text3);font-size:13px;">No traffic data available</div>'}
            </div>
            ${traffic.length?`<div class="chart-labels">${traffic.map((_,i)=>`<span>W${i+1}</span>`).join('')}</div>`:''}
          </div>

          <!-- Products Carousel -->
          <div class="section">
            <div class="section-title">
              <span class="ico">&#128722;</span> Products: ${topProducts.length}
              <div style="margin-left:auto;display:flex;gap:4px;" id="products-tabs">
                <button class="section-tab active" onclick="switchProductsTab('best',this)">Best Sellers</button>
                <button class="section-tab" onclick="switchProductsTab('recent',this)">Recently Added</button>
              </div>
            </div>
            <div class="products-carousel" id="products-carousel">
              ${topProducts.length>0?topProducts.slice(0,10).map(p=>`
              <div class="product-card">
                <div class="product-image">
                  ${p.image?`<img src="${p.image}" onerror="this.style.display='none'"/><div style="display:flex;align-items:center;justify-content:center;width:100%;height:100%;background:#f5f0eb;font-size:24px;">&#128722;</div>`:'<div style="display:flex;align-items:center;justify-content:center;width:100%;height:100%;background:#f5f0eb;font-size:24px;">&#128722;</div>'}
                </div>
                <div class="product-title">${p.title||p.name||'Product'}</div>
                ${p.price?`<div class="product-price">$${parseFloat(p.price).toFixed(2)}</div>`:''}
                ${p.created_date?`<div class="product-date">${new Date(p.created_date).toLocaleDateString()}</div>`:''}
              </div>
              `).join(''):'<div style="color:var(--text3);font-size:13px;padding:20px;">No products data available</div>'}
            </div>
          </div>

          <!-- Ads History Chart -->
          <div class="section">
            <div class="section-title">
              <span class="ico">&#128227;</span> Active Ads Over Time
              <div style="margin-left:auto;display:flex;gap:4px;" id="ads-chart-range">
                <button class="range-btn" data-range="3m" onclick="loadAdsChart('${s.domain}','3m',this)">3M</button>
                <button class="range-btn active" data-range="6m" onclick="loadAdsChart('${s.domain}','6m',this)">6M</button>
                <button class="range-btn" data-range="all" onclick="loadAdsChart('${s.domain}','all',this)">ALL</button>
              </div>
            </div>
            <div style="display:flex;align-items:center;gap:10px;margin-bottom:12px;">
              <span style="font-size:28px;font-weight:800;color:var(--text1);" id="ads-chart-current">${ads}</span>
              <span style="font-size:12px;color:var(--pink);font-weight:700;">&#128994; Active now</span>
            </div>
            <div id="ads-chart-container" style="height:180px;position:relative;">
              <canvas id="ads-chart-canvas" style="width:100%;height:100%;"></canvas>
            </div>
            <div id="ads-chart-labels" style="display:flex;justify-content:space-between;margin-top:6px;font-size:9px;color:var(--text3);font-weight:600;"></div>
          </div>

          <!-- Pixels & Apps (compact, collapsible) -->
          <details class="section" style="padding:10px 14px;">
            <summary style="cursor:pointer;font-weight:700;font-size:13px;display:flex;align-items:center;gap:6px;list-style:none;">
              <span class="ico">&#128225;</span> Pixels & Apps
              <span style="color:var(--text3);font-size:11px;font-weight:500;margin-left:auto;">${(pixels||[]).length} pixels · ${(apps||[]).length} apps</span>
            </summary>
            <div style="margin-top:10px;">
              <div class="section-tabs" style="margin-bottom:8px;">
                <div class="section-tab active" onclick="switchPixelsTab('pixels',this)">Pixels</div>
                <div class="section-tab" onclick="switchPixelsTab('apps',this)">Apps Shopify</div>
              </div>
              <div id="pixels-panel" style="display:block;max-height:180px;overflow-y:auto;">
                ${renderPixelCards(pixels, techs)}
              </div>
              <div id="apps-panel" style="display:none;max-height:180px;overflow-y:auto;">
                ${renderAppCards(apps)}
              </div>
            </div>
          </details>

          <!-- Growth Strategies -->
          <div class="section">
            <div class="section-title"><span class="ico">&#127919;</span> Growth Strategies</div>
            ${strats.length?`<div class="tags">${strats.map(s2=>`<span class="tag strat">${s2}</span>`).join('')}</div>`:'<div style="color:var(--text3);font-size:13px;">No strategies detected</div>'}
          </div>

          <!-- Latest Ads Section -->
          <div class="section">
            <div class="section-title">
              <span class="ico">&#128227;</span> Dernières Ads
              <a class="see-more" onclick="switchTab('ads',document.querySelectorAll('.tab')[2])" href="javascript:;">See more →</a>
            </div>
            <div class="ads-scroll" id="latest-ads-scroll">
              <div style="color:var(--text3);font-size:13px;padding:20px;">Loading ads...</div>
            </div>
          </div>
        </div>

        <div>
          <!-- Store Details -->
          <div class="section">
            <div class="section-title"><span class="ico">&#128203;</span> Store Details</div>
            <div class="details-grid">
              <div class="detail-item"><span class="label">Theme</span><span class="value">${theme}</span></div>
              <div class="detail-item"><span class="label">Currency</span><span class="value">${currency}</span></div>
              <div class="detail-item"><span class="label">Language</span><span class="value">${lang}</span></div>
              <div class="detail-item"><span class="label">Shopify Plan</span><span class="value">${plan}</span></div>
              <div class="detail-item"><span class="label">Country</span><span class="value">${country?country.toUpperCase():'N/A'} ${country?`<img class="flag-img" src="https://flagcdn.com/w40/${country.toLowerCase()}.png" style="margin-left:4px;"/>`:''}</span></div>
              <div class="detail-item"><span class="label">Created</span><span class="value">${created||'N/A'}</span></div>
              <div class="detail-item"><span class="label">Age</span><span class="value">${age}</span></div>
              ${merchantName?`<div class="detail-item"><span class="label">Merchant</span><span class="value">${merchantName}</span></div>`:''}
            </div>
          </div>

          <!-- Ships To -->
          <div class="section">
            <div class="section-title"><span class="ico">&#127758;</span> Ships To (${shipsTo.length} countries)</div>
            ${shipsTo.length?`<div class="tags">${shipsTo.slice(0,25).map(c2=>`<span class="tag ship">${c2.toUpperCase()} <img src="https://flagcdn.com/w20/${c2.toLowerCase()}.png" style="width:14px;height:10px;border-radius:1px;"/></span>`).join('')}${shipsTo.length>25?`<span style="color:var(--text3);font-size:11px;">+${shipsTo.length-25} more</span>`:''}</div>`:'<div style="color:var(--text3);font-size:13px;">No shipping info available</div>'}
          </div>

          <!-- Meta Ads Intelligence Link -->
          <div class="section" style="background:linear-gradient(135deg,rgba(232,121,154,0.06),rgba(232,121,154,0.02));border-color:rgba(232,121,154,0.15);">
            <div class="section-title"><span class="ico">&#128226;</span> Meta Ads Intelligence</div>
            <p style="font-size:13px;color:var(--text2);margin-bottom:12px;">
              ${ads>0?`This store has <strong style="color:var(--pink);">${ads} active ads</strong> running on Meta.`:'No active Meta ads detected.'}
            </p>
            <div style="display:flex;gap:8px;">
              <a class="shop-btn primary" href="https://www.facebook.com/ads/library/?active_status=active&ad_type=all&q=${encodeURIComponent(s.domain)}" target="_blank">
                &#128269; View on Meta Library
              </a>
              <button class="shop-btn" onclick="switchTab('ads',document.querySelectorAll('.tab')[2])">&#128202; See Ads Analysis</button>
            </div>
          </div>
        </div>
      </div>
    </div>

    <!-- Panel: Similar Shops -->
    <div class="tab-panel" id="panel-similar">
      <div class="section">
        <div class="section-title"><span class="ico">&#127978;</span> Similar Shops <span style="font-family:Figtree;font-size:12px;color:var(--text3);font-weight:500;margin-left:8px;">Shops in the same niche & country</span></div>
        <div class="sim-grid" id="similar-shops">
          <div class="loading" style="grid-column:1/-1;height:200px;"><div class="spinner"></div><div>Finding similar shops...</div></div>
        </div>
      </div>
    </div>

    <!-- Panel: Meta Ads -->
    <div class="tab-panel" id="panel-ads">
      <div class="section">
        <div class="section-title">
          <span class="ico">&#128227;</span> Meta Ads Analysis
        </div>

        <!-- Ads History Chart (bigger) -->
        <div style="margin-bottom:24px;">
          <div style="font-size:13px;font-weight:700;margin-bottom:12px;color:var(--text1);">Ad Activity Over Time</div>
          <div id="meta-ads-chart-container" style="height:250px;position:relative;">
            <canvas id="meta-ads-chart-canvas" style="width:100%;height:100%;"></canvas>
          </div>
          <div id="meta-ads-chart-labels" style="display:flex;justify-content:space-between;margin-top:6px;font-size:9px;color:var(--text3);font-weight:600;"></div>
        </div>

        <!-- Media Mix -->
        <div style="margin-bottom:24px;">
          <div style="font-size:13px;font-weight:700;margin-bottom:12px;color:var(--text1);">Media Mix</div>
          <div id="media-mix-container">
            <div class="media-mix-row">
              <div class="media-mix-label">Video</div>
              <div class="media-mix-bars" style="width:100%;">

// Fetch ads with multi-layer fallback: API → Supabase ads table → Meta Library link
async function fetchAdsWithFallback(domainName, limit){
  // Layer 0 (primary): Query our meta_ads table — filled by the Peekr scraper
  try{
    const cleanDomain0=domainName.replace(/^www\./,'');
    const queries=[cleanDomain0, 'www.'+cleanDomain0];
    for(const q of queries){
      const url=_SB+'/rest/v1/meta_ads?shop_domain=eq.'+encodeURIComponent(q)+'&select=ad_id,headline,ad_text,cta_type,image_url,video_url,original_fb_url,platform,status,first_seen,last_seen&order=first_seen.desc.nullslast&limit='+limit;
      const data=await sbFetch(url);
      if(data && data.length>0){
        const ads=data.map(row=>({
          ad_id:row.ad_id,
          page_name:row.headline||'',
          body:row.ad_text||'',
          ad_snapshot_url:row.original_fb_url||'',
          snapshot_url:row.original_fb_url||'',
          image_url:row.image_url||'',
          video_url:row.video_url||'',
          status:row.status||'active',
          days_active:row.first_seen?Math.floor((Date.now()-new Date(row.first_seen).getTime())/(1000*60*60*24)):0,
          start_date:row.first_seen||'',
          platforms:row.platform?row.platform.split(','):['facebook'],
          peekr_score:0
        }));
        return {source:'meta_ads', ads};
      }
    }
  }catch(e){}

  // Layer 1: Try the Meta API via our backend
  try{
    const resp=await fetch(API_BASE+'?action=ad-creatives&domain='+encodeURIComponent(domainName)+'&limit='+limit);
    const data=await resp.json();
    if(data.ads && data.ads.length>0) return {source:'meta-api', ads:data.ads};
  }catch(e){}

  // Layer 2: Query Supabase ads table directly (search by domain in page_name or shop_domain)
  try{
    const cleanDomain=domainName.replace(/^www\./,'');
    const searchTerm=cleanDomain.replace(/\.(com|fr|de|co\.uk|es|it|io|shop|store|net|org)$/i,'');
    // Try shop_domain match first, then page_name partial match
    let query=_SB+'/rest/v1/ads?select=id,meta_ad_id,page_name,page_id,ad_creative_body,ad_snapshot_url,ad_delivery_start_time,status,niche,peekr_score,publisher_platforms&order=ad_delivery_start_time.desc.nullslast&limit='+limit;
    // First try exact shop_domain
    let data=await sbFetch(query+'&shop_domain=eq.'+encodeURIComponent(cleanDomain));
    if(!data||data.length===0){
      // Try ilike on shop_domain
      data=await sbFetch(query+'&shop_domain=ilike.*'+encodeURIComponent(searchTerm)+'*');
    }
    if(!data||data.length===0){
      // Try page_name ilike
      data=await sbFetch(query+'&page_name=ilike.*'+encodeURIComponent(searchTerm)+'*');
    }
    if(data && data.length>0){
      const ads=data.map(row=>({
        ad_id:row.meta_ad_id||row.id,
        page_name:row.page_name||'',
        body:row.ad_creative_body||'',
        ad_snapshot_url:row.ad_snapshot_url||'',
        snapshot_url:row.ad_snapshot_url||'',
        status:row.status||'active',
        days_active:row.ad_delivery_start_time?Math.floor((Date.now()-new Date(row.ad_delivery_start_time).getTime())/(1000*60*60*24)):0,
        start_date:row.ad_delivery_start_time||'',
        platforms:row.publisher_platforms||[],
        peekr_score:row.peekr_score||0
      }));
      return {source:'supabase', ads};
    }
  }catch(e){}

  return {source:'none', ads:[]};
}

async function loadSimilarShops(shop){
  const container=document.getElementById('similar-shops');
  try{

    const country=shop.country||'';
    let query=_SB+'/rest/v1/shops?select=domain,name,title,country,score,monthly_visits,products_count,live_ads,icon,niche,categories,created_date&domain=neq.'+encodeURIComponent(shop.domain)+'&order=score.desc&limit=12';

    else if(country) query+='&country=eq.'+encodeURIComponent(country);

    const data=await sbFetch(query);
    if(!data||data.length===0){
      const fallback=await sbFetch(_SB+'/rest/v1/shops?select=domain,name,title,country,score,monthly_visits,products_count,live_ads,icon,niche,created_date&domain=neq.'+encodeURIComponent(shop.domain)+'&country=eq.'+encodeURIComponent(country)+'&order=score.desc&limit=12');

      renderSimilar(container, data);

  }catch(e){
    container.innerHTML='<div style="color:var(--text3);font-size:13px;">Could not load similar shops.</div>';
  }

// Update media mix based on meta_ads data (check image_url vs video_url)
function updateMediaMixFromMetaAds(ads){
  const mixContainer=document.getElementById('media-mix-container');
  if(!mixContainer||!ads.length) return;
  let video=0,image=0,other=0;
  ads.forEach(ad=>{
    if(ad.video_url) video++;
    else if(ad.image_url) image++;
    else other++;
  });
  const total=ads.length;
  const vPct=total>0?Math.round(video/total*100):0;
  const iPct=total>0?Math.round(image/total*100):0;
  const oPct=total>0?Math.round(other/total*100):0;
  mixContainer.innerHTML=`
    <div class="media-mix-row"><div class="media-mix-label">Video</div><div class="media-mix-bars" style="width:100%;"><div class="media-mix-bar video" style="width:${vPct}%;"></div></div><div style="font-size:11px;font-weight:700;color:var(--text1);min-width:40px;text-align:right;">${vPct}%</div></div>
    <div class="media-mix-row"><div class="media-mix-label">Image</div><div class="media-mix-bars" style="width:100%;"><div class="media-mix-bar image" style="width:${iPct}%;"></div></div><div style="font-size:11px;font-weight:700;color:var(--text1);min-width:40px;text-align:right;">${iPct}%</div></div>
    <div class="media-mix-row"><div class="media-mix-label">Other</div><div class="media-mix-bars" style="width:100%;"><div class="media-mix-bar dco" style="width:${oPct}%;"></div></div><div style="font-size:11px;font-weight:700;color:var(--text1);min-width:40px;text-align:right;">${oPct}%</div></div>`;
}

// Update media mix display based on actual ad data
function updateMediaMix(ads){
  const mixContainer=document.getElementById('media-mix-container');
  if(!mixContainer||!ads.length) return;
  let video=0,image=0,other=0;
  ads.forEach(ad=>{
    const snap=(ad.ad_snapshot_url||ad.snapshot_url||'').toLowerCase();
    if(snap.includes('.mp4')||snap.includes('.webm')||snap.includes('video')) video++;
    else if(snap.includes('.jpg')||snap.includes('.png')||snap.includes('.jpeg')||snap.includes('image')) image++;
    else other++;
  });
  const total=ads.length;
  const vPct=Math.round(video/total*100);
  const iPct=Math.round(image/total*100);
  const oPct=Math.round(other/total*100);
  mixContainer.innerHTML=`
    <div class="media-mix-row"><div class="media-mix-label">Video</div><div class="media-mix-bars" style="width:100%;"><div class="media-mix-bar video" style="width:${vPct}%;"></div></div><div style="font-size:11px;font-weight:700;color:var(--text1);min-width:40px;text-align:right;">${vPct}%</div></div>
    <div class="media-mix-row"><div class="media-mix-label">Image</div><div class="media-mix-bars" style="width:100%;"><div class="media-mix-bar image" style="width:${iPct}%;"></div></div><div style="font-size:11px;font-weight:700;color:var(--text1);min-width:40px;text-align:right;">${iPct}%</div></div>
    <div class="media-mix-row"><div class="media-mix-label">Other</div><div class="media-mix-bars" style="width:100%;"><div class="media-mix-bar dco" style="width:${oPct}%;"></div></div><div style="font-size:11px;font-weight:700;color:var(--text1);min-width:40px;text-align:right;">${oPct}%</div></div>`;
}

function renderPixelCards(pixels, techs){
  const pixelIcons={
    'Google Analytics':'📊',
    'Google Tag Manager':'🏷️',
    'Meta Pixel':'Ⓜ️',
    'Facebook Pixel':'ⓕ',
    'Google Ads':'📢',
    'TikTok Pixel':'🎵',
    'Snap Pixel':'👻',
    'Pinterest Tag':'📌',
    'Microsoft Ads':'Ⓜ',
    'Criteo':'💰'
  };

  // Parse pixel data - handle both simple strings and complex objects from API
  let pixelList=[];
  if(pixels.length>0){
    pixelList=pixels.map(p=>{
      if(typeof p==='object'){
        return p;
      }
      if(typeof p==='string'){
        try{
          return JSON.parse(p);
        }catch(e){
          return{name:p};
        }
      }
      return{name:String(p)};
    });
  }else{
    // Fallback to tech names if no pixel objects
    pixelList=techs.filter(t=>/(pixel|analytics|tag manager|ads)/i.test(t)).slice(0,10).map(t=>(typeof t==='object'?t:{name:typeof t==='string'?t:'Unknown'}));
  }

  if(!pixelList.length) return '<div style="color:var(--text3);font-size:13px;">No pixels detected</div>';

  return '<div style="display:grid;grid-template-columns:repeat(auto-fill,minmax(200px,1fr));gap:12px;">'+pixelList.map(p=>{
    const name=p.name||'Unknown';
    const iconUrl=p.icon_url||'';
    const desc=(p.description||'').substring(0,80);
    const categories=Array.isArray(p.categories)?p.categories:[];
    const installs=p.installs||0;
    const installedAt=p.installed_at||'';
    const vendorUrl=p.vendor_url||'';

    const fallbackIcon=pixelIcons[name]||'📊';
    const formattedInstalls=installs?fmtV(installs)+' installs':'';
    const installedDate=installedAt?new Date(installedAt).toLocaleDateString('en-US',{month:'short',day:'numeric',year:'2-digit'}):'';

    return `<div style="background:var(--card);border:1px solid var(--border);border-radius:12px;padding:14px;transition:all .15s;cursor:pointer;display:flex;flex-direction:column;gap:10px;min-height:220px;">
      <div style="display:flex;align-items:flex-start;gap:10px;">
        ${iconUrl?`<img src="${iconUrl}" alt="${name}" style="width:40px;height:40px;border-radius:8px;object-fit:contain;background:#f5f0eb;padding:4px;flex-shrink:0;" onerror="this.style.display='none';this.nextElementSibling.style.display='flex';"/><div style="width:40px;height:40px;border-radius:8px;background:rgba(232,121,154,0.1);display:none;align-items:center;justify-content:center;font-size:20px;flex-shrink:0;">${fallbackIcon}</div>`:
        `<div style="width:40px;height:40px;border-radius:8px;background:rgba(232,121,154,0.1);display:flex;align-items:center;justify-content:center;font-size:20px;flex-shrink:0;">${fallbackIcon}</div>`}
        <div style="flex:1;min-width:0;">
          <div style="font-size:13px;font-weight:700;color:var(--text1);line-height:1.3;word-break:break-word;">${name}</div>
          ${categories.length?`<div style="font-size:10px;color:var(--text3);margin-top:4px;">${categories.slice(0,2).join(' • ')}</div>`:''}
        </div>
      </div>
      ${desc?`<div style="font-size:11px;color:var(--text2);line-height:1.4;flex-grow:1;">${desc}${desc.length>=80?'...':''}</div>`:''}
      <div style="display:flex;align-items:center;justify-content:space-between;padding-top:8px;border-top:1px solid var(--border);font-size:10px;color:var(--text3);">
        <span>${formattedInstalls}</span>
        ${installedDate?`<span>${installedDate}</span>`:''}
      </div>
    </div>`;
  }).join('')+'</div>';
}

function renderAppCards(apps){
  if(!apps.length) return '<div style="color:var(--text3);font-size:13px;">No apps detected</div>';

  return '<div class="tags">'+apps.map(a=>`<span class="tag app">${a.icon?`<img src="${a.icon}" style="width:14px;height:14px;border-radius:2px;" onerror="this.style.display='none'"/>`:''} ${a.name}</span>`).join('')+'</div>';
}

// --- Helpers ---
function fmtV(n){
  if(!n)return '0';
  if(n>=1e6)return(n/1e6).toFixed(1)+'M';
  if(n>=1e3)return(n/1e3).toFixed(n>=1e4?0:1)+'K';
  return n.toLocaleString();
}

function getAge(dateStr){
  const d=new Date(dateStr);
  const now=new Date();
  const months=Math.round((now-d)/(30.44*24*60*60*1000));
  if(months<1)return 'New';
  if(months<12)return months+'mo';
  const y=Math.floor(months/12);
  const m=months%12;
  return y+'y'+(m>0?' '+m+'mo':'');
}

// --- Ads History Chart (like TrendTrack "Ads actives dans le temps") ---
async function loadAdsChart(domain, range, btnEl) {
  if (btnEl) {
    document.querySelectorAll('#ads-chart-range .range-btn').forEach(b => b.classList.remove('active'));
    btnEl.classList.add('active');
  }

  const canvas = document.getElementById('ads-chart-canvas');
  const labelsEl = document.getElementById('ads-chart-labels');
  if (!canvas) return;

  try {
    const resp = await fetch(API_BASE+'?action=ads-history&domain='+encodeURIComponent(domain)+'&range='+range);
    const data = await resp.json();

    if (data.current_live_ads) {
      document.getElementById('ads-chart-current').textContent = data.current_live_ads.toLocaleString();
    }

    const history = data.history || [];
    if (history.length < 2) {
      const ctx = canvas.getContext('2d');
      ctx.clearRect(0, 0, canvas.width, canvas.height);
      canvas.parentElement.innerHTML = `
        <div style="height:180px;display:flex;flex-direction:column;align-items:center;justify-content:center;color:var(--text3);">
          <div style="font-size:32px;margin-bottom:8px;">&#128202;</div>
          <div style="font-size:13px;font-weight:600;">Historical data building up</div>
          <div style="font-size:11px;margin-top:4px;">Chart will appear once we have multiple daily snapshots</div>
        </div>`;
      labelsEl.innerHTML = '';
      return;
    }

    drawAdsChart(canvas, history, labelsEl);
  } catch (e) {
    console.error('Ads chart error:', e);
  }
}

function drawAdsChart(canvas, history, labelsEl) {
  const dpr = window.devicePixelRatio || 1;
  const rect = canvas.parentElement.getBoundingClientRect();
  canvas.width = rect.width * dpr;
  canvas.height = rect.height * dpr;
  canvas.style.width = rect.width + 'px';
  canvas.style.height = rect.height + 'px';
  const ctx = canvas.getContext('2d');
  ctx.scale(dpr, dpr);
  ctx.clearRect(0, 0, rect.width, rect.height);

  const values = history.map(h => h.live_ads);
  const dates = history.map(h => h.recorded_at);
  const maxVal = Math.max(...values, 1);
  const minVal = Math.min(...values, 0);
  const range = maxVal - minVal || 1;
  const pad = { top: 20, right: 10, bottom: 5, left: 40 };
  const w = rect.width - pad.left - pad.right;
  const h = rect.height - pad.top - pad.bottom;

  // Y-axis labels
  ctx.fillStyle = '#b8a8b0';
  ctx.font = '10px Figtree, sans-serif';
  ctx.textAlign = 'right';
  for (let i = 0; i <= 4; i++) {
    const val = minVal + (range * (4 - i) / 4);
    const y = pad.top + (h * i / 4);
    ctx.fillText(fmtV(Math.round(val)), pad.left - 6, y + 3);
    ctx.strokeStyle = 'rgba(200,160,170,0.1)';
    ctx.lineWidth = 1;
    ctx.beginPath();
    ctx.moveTo(pad.left, y);
    ctx.lineTo(pad.left + w, y);
    ctx.stroke();
  }

  // Draw filled area + line
  const points = values.map((v, i) => ({
    x: pad.left + (i / (values.length - 1)) * w,
    y: pad.top + h - ((v - minVal) / range) * h
  }));

  // Filled area
  ctx.beginPath();
  ctx.moveTo(points[0].x, pad.top + h);
  points.forEach(p => ctx.lineTo(p.x, p.y));
  ctx.lineTo(points[points.length - 1].x, pad.top + h);
  ctx.closePath();
  const grad = ctx.createLinearGradient(0, pad.top, 0, pad.top + h);
  grad.addColorStop(0, 'rgba(232,121,154,0.25)');
  grad.addColorStop(1, 'rgba(232,121,154,0.02)');
  ctx.fillStyle = grad;
  ctx.fill();

  // Line
  ctx.beginPath();
  points.forEach((p, i) => i === 0 ? ctx.moveTo(p.x, p.y) : ctx.lineTo(p.x, p.y));
  ctx.strokeStyle = '#e8799a';
  ctx.lineWidth = 2;
  ctx.lineJoin = 'round';
  ctx.stroke();

  // Dots on last point
  const last = points[points.length - 1];
  ctx.beginPath();
  ctx.arc(last.x, last.y, 4, 0, Math.PI * 2);
  ctx.fillStyle = '#e8799a';
  ctx.fill();
  ctx.beginPath();
  ctx.arc(last.x, last.y, 6, 0, Math.PI * 2);
  ctx.strokeStyle = 'rgba(232,121,154,0.3)';
  ctx.lineWidth = 2;
  ctx.stroke();

  // X-axis labels (show ~6 dates evenly spaced)
  const labelCount = Math.min(dates.length, 6);
  const step = Math.max(1, Math.floor(dates.length / labelCount));
  let labelsHtml = '';
  for (let i = 0; i < dates.length; i += step) {
    const d = new Date(dates[i]);
    const label = d.toLocaleDateString('en', { month: 'short', day: 'numeric' });
    labelsHtml += `<span>${label}</span>`;
  }
  labelsEl.innerHTML = labelsHtml;
}

// Auto-load ads chart on page load
function initAdsChart(domain) {
  setTimeout(() => loadAdsChart(domain, '6m', null), 500);
}

async function saveShop(domain){
  try{
    const res=await fetch(_SB+'/rest/v1/saved_shops',{
      method:'POST',
      headers:{'apikey':_AK,'Content-Type':'application/json','Prefer':'return=minimal'},
      body:JSON.stringify({user_id:'00000000-0000-0000-0000-000000000000',shop_domain:domain})
    });
    if(res.ok||res.status===201)alert('Shop saved!');
    else if(res.status===409)alert('Already saved!');
    else alert('Could not save.');
  }catch(e){alert('Error saving shop.');}
}
